actors.hero.talent.yuzu_t1_1.title=下次一定
actors.hero.talent.yuzu_t1_1.desc=_+1:_柚子进食后的_2次_攻击必定暴击。\n\n_+2:_柚子进食后的_3次_攻击必定暴击。\n\n该天赋堆叠上限为五次攻击。
actors.hero.talent.yuzu_t1_2.title=榴弹发射器专家
actors.hero.talent.yuzu_t1_2.desc=_+1:__装备GL时_能将其立即鉴定。\n\n_+2:__捡起GL时_能将其立即鉴定。
actors.hero.talent.yuzu_t1_3.title=看脸凹分
actors.hero.talent.yuzu_t1_3.desc=_+1:_柚子的暴击造成伤害_+3点_。\n\n_+2:_柚子的暴击造成伤害_+5点_。
actors.hero.talent.yuzu_t1_4.title=安全装置
actors.hero.talent.yuzu_t1_4.desc=_+1:_柚子对相邻敌人的射击若未命中，则获得_5点_护盾。\n\n_+2:_柚子对相邻敌人的射击若未命中，则获得_8点_护盾。

actors.hero.talent.yuzu_t2_1.title=消灭BUG
actors.hero.talent.yuzu_t2_1.desc=_+1:_柚子进食仅消耗1回合，并_清除自身的负面效果_。\n\n_+2:_柚子进食仅消耗1回合，并_清除自身的负面效果，获得2回合全面净化效果_。\n\n不会净化饥饿状态。
actors.hero.talent.yuzu_t2_2.title=查看地图
actors.hero.talent.yuzu_t2_2.desc=_+1:_柚子在阅读卷轴或使用法术结晶后会_搜索周围8格_。\n\n_+2：_柚子在阅读卷轴或使用法术结晶后会_搜索周围12格_。\n\n如果使用的是升级卷轴、嬗变卷轴或须用前述卷轴炼制的炼金物品，则搜索的距离翻倍。\n\n对产量较高的炼金物品(如大多数结晶)，这项天赋会基于该物品的单次产出数量修正搜索距离。
actors.hero.talent.yuzu_t2_3.title=缓冲加载
actors.hero.talent.yuzu_t2_3.desc=_+1:_柚子在承受物理伤害时，以_+3_护甲的迟缓刻印效果延缓伤害，即延缓_44%_的所受伤害。\n\n_+2:_柚子在承受物理伤害时，以_+5_护甲的迟缓刻印效果延缓伤害，即延缓_55%_的所受伤害。\n\n该效果可与护甲实际的迟缓刻印叠加。
actors.hero.talent.yuzu_t2_4.title=连续暴击
actors.hero.talent.yuzu_t2_4.desc=_+1:_柚子暴击后，下次攻击的暴击率_+10%_。\n\n_+2:_柚子暴击后，下次攻击的暴击率_+20%_。\n\n该效果不叠加。
actors.hero.talent.yuzu_t2_5.title=充值返现
actors.hero.talent.yuzu_t2_5.desc=_+1:_柚子使用游戏机购买后，消耗信用点的_5%_会被返还。\n\n_+2:_柚子使用游戏机购买后，消耗信用点的_10%_会被返还。

actors.hero.talent.yuzu_t3_1.title=抽卡之神
actors.hero.talent.yuzu_t3_1.desc=_+1:_柚子购买随机消耗品时掉率按_+1_财富戒指计（而非+0），购买随机装备时装备有_5%_几率额外获得+1强化等级。\n\n_+2:_柚子购买随机消耗品时掉率按_+2_财富戒指计（而非+0），购买随机装备时装备有_10%_几率额外获得+1强化等级。\n\n_+3:_柚子购买随机消耗品时掉率按_+3_财富戒指计（而非+0），购买随机装备时装备有_15%_几率额外获得+1强化等级。
actors.hero.talent.yuzu_t3_2.title=UZQ模式
actors.hero.talent.yuzu_t3_2.desc=_+1:_柚子暴击时有_33%_概率获得UZQ效果，必定闪避受到的下次攻击。\n\n_+2:_柚子暴击时有_67%_概率获得UZQ效果，必定闪避受到的下次攻击。\n\n_+3:_柚子暴击时有_100%_概率获得UZQ效果，必定闪避受到的下次攻击。\n\n该效果无法叠加。

actors.hero.talent.yuzu_ex1_1.title=自我修复
actors.hero.talent.yuzu_ex1_1.desc=_+1:_击败敌人时，前卫君若在场则获得_2点_治疗，否则使前卫君的冷却时间_-10回合_。\n\n_+2:_击败敌人时，前卫君若在场则获得_4点_治疗，否则使前卫君的冷却时间_-20回合_。\n\n_+3:_击败敌人时，前卫君若在场则获得_6点_治疗，否则使前卫君的冷却时间_-30回合_。
actors.hero.talent.yuzu_ex1_2.title=火力增强
actors.hero.talent.yuzu_ex1_2.desc=_+1:_前卫君远程射击时被使用的枪支视作有_+2_额外升级, 最多不超过_+4_。\n\n_+2:_前卫君远程射击时被使用的枪支视作有_+3_额外升级, 最多不超过_+5_。\n\n_+3:_前卫君远程射击时被使用的枪支视作有_+4_额外升级, 最多不超过_+6_。
actors.hero.talent.yuzu_ex1_3.title=钻头掘进
actors.hero.talent.yuzu_ex1_3.desc=_+1:_前卫君的近战攻击可摧毁墙壁，消耗_3回合_。\n\n_+2:_前卫君的近战攻击可摧毁墙壁，消耗_2回合_。\n\n_+3:_前卫君的近战攻击可摧毁墙壁，消耗_1回合_。\n\n在boss层无效。

actors.hero.talent.yuzu_ex2_1.title=格斗手柄
actors.hero.talent.yuzu_ex2_1.desc=_+1:_可以购买_格斗游戏手柄_。\n\n_+2:_使用格斗游戏手柄时，近战攻击力与戴有_+2_武力戒指相当。\n\n_+3:_使用格斗游戏手柄时，近战攻击力与戴有_+4_武力戒指相当。\n\n+1时，近战攻击力视作戴有_+0_的武力戒指。
actors.hero.talent.yuzu_ex2_2.title=奇幻手柄
actors.hero.talent.yuzu_ex2_2.desc=_+1:_可以购买_奇幻游戏手柄_。\n\n_+2:_使用奇幻游戏手柄时，魔法的伤害_+10-30_。\n\n_+3:_使用奇幻游戏手柄时，魔法的伤害_+15-40_。\n\n+1时，魔法的伤害_+5-20_，伤害性法术造成的伤害受英雄等级与此加成数值影响。
actors.hero.talent.yuzu_ex2_3.title=沙盒手柄
actors.hero.talent.yuzu_ex2_3.desc=_+1:_可以购买_沙盒游戏手柄_。\n\n_+2:_使用沙盒游戏手柄时，获得_12枚_代币。\n\n_+3:_使用沙盒游戏手柄时，获得_15枚_代币。\n\n+1时，获得_10枚_代币，各种修改地形效果消耗数量不等的代币。

actors.hero.talent.yuzu_armor1_1.title=神级操控
actors.hero.talent.yuzu_armor1_1.desc=_+1:_使用能力后必定闪避接下来受到的_0.5次_攻击。\n\n_+2:_使用能力后必定闪避接下来受到的_1次_攻击。\n\n_+3:_使用能力后必定闪避接下来受到的_1.5次_攻击。\n\n_+4:_使用能力后必定闪避接下来受到的_2次_攻击。\n\n0.5次的意思是有50%概率生效1次。
actors.hero.talent.yuzu_armor1_2.title=场间恢复
actors.hero.talent.yuzu_armor1_2.desc=_+1:_能力效果结束时恢复期间所受伤害的_30%+5_点生命值。\n\n_+2:_能力效果结束时恢复期间所受伤害的_50%+10_点生命值。\n\n_+3:_能力效果结束时恢复期间所受伤害的_65%+15_点生命值。\n\n_+4:_能力效果结束时恢复期间所受伤害的_75%+20_点生命值。
actors.hero.talent.yuzu_armor1_3.title=车轮竞技
actors.hero.talent.yuzu_armor1_3.desc=_+1:_能力效果结束后的3回合内再次使用能力，消耗的能量_-16%_。\n\n_+2:_能力效果结束后的3回合内再次使用能力，消耗的能量_-30%_。\n\n_+3:_能力效果结束后的3回合内再次使用能力，消耗的能量_-40%_。\n\n_+4:_能力效果结束后的3回合内再次使用能力，消耗的能量_-50%_。

actors.hero.talent.yuzu_armor2_1.title=储备零食
actors.hero.talent.yuzu_armor2_1.desc=_+1:_使用能力恢复_25点_饥饿值，_3点_生命值，并有_25%_概率触发进食效果。\n\n_+2:_使用能力恢复_50点_饥饿值，_6点_生命值，并有_50%_概率触发进食效果。\n\n_+3:_使用能力恢复_75点_饥饿值，_9点_生命值，并有_75%_概率触发进食效果。\n\n_+4:_使用能力恢复_100点_饥饿值，_12点_生命值，并有_100%_概率触发进食效果。
actors.hero.talent.yuzu_armor2_2.title=整备时间
actors.hero.talent.yuzu_armor2_2.desc=_+1:_使用能力为当前装备的枪支装填_1发_子弹。\n\n_+2:_使用能力为当前装备的枪支装填_2发_子弹。\n\n_+3:_使用能力为当前装备的枪支装填_3发_子弹。\n\n_+4:_使用能力为当前装备的枪支装填_4发_子弹。\n\n该效果可超出弹夹容量上限。
actors.hero.talent.yuzu_armor2_3.title=社恐属性
actors.hero.talent.yuzu_armor2_3.desc=_+1:_效果结束时若视野内有敌人，获得_2回合_飞影，可不耗回合地移动。\n\n_+2:_效果结束时若视野内有敌人，获得_4回合_飞影，可不耗回合地移动。\n\n_+3:_效果结束时若视野内有敌人，获得_6回合_飞影，可不耗回合地移动。\n\n_+4:_效果结束时若视野内有敌人，获得_8回合_飞影，可不耗回合地移动。

actors.hero.talent.yuzu_armor3_1.title=保险护盾
actors.hero.talent.yuzu_armor3_1.desc=_+1:_可购买保险护盾，效果为_立刻获得30点护盾_。\n\n_+2:_可购买保险护盾，效果为_立刻获得60点护盾_。\n\n_+3:_可购买保险护盾，效果为_立刻获得90点护盾_。\n\n_+4:_可购买保险护盾，效果为_立刻获得120点护盾_。\n\n每次技能效果持续期间仅可购买一次无敌。
actors.hero.talent.yuzu_armor3_2.title=无限弹夹
actors.hero.talent.yuzu_armor3_2.desc=_+1:_可购买无限弹夹，效果为_5回合内射击不消耗子弹_。\n\n_+2:_可购买无限弹夹，效果为_10回合内射击不消耗子弹_。\n\n_+3:_可购买无限弹夹，效果为_15回合内射击不消耗子弹_。\n\n_+4:_可购买无限弹夹，效果为_20回合内射击不消耗子弹_。
actors.hero.talent.yuzu_armor3_3.title=结算兑换
actors.hero.talent.yuzu_armor3_3.desc=_+1:_可结算兑换，立刻结束VIP效果，其每剩余1回合，柚子获得_100_信用点。\n\n_+2:_可结算兑换，立刻结束VIP效果，其每剩余1回合，柚子获得_150_信用点。\n\n_+3:_可结算兑换，立刻结束VIP效果，其每剩余1回合，柚子获得_200_信用点。\n\n_+4:_可结算兑换，立刻结束VIP效果，其每剩余1回合，柚子获得_250_信用点。

actors.hero.abilities.yuzu.pvp.name=真人快打
actors.hero.abilities.yuzu.pvp.prompt=选择一个目标
actors.hero.abilities.yuzu.pvp.already_dueling=你已经发动效果了。
actors.hero.abilities.yuzu.pvp.ally_target=只能对敌人发动。
actors.hero.abilities.yuzu.pvp.unreachable_target=必须选择可到达的位置
actors.hero.abilities.yuzu.pvp.distant_target=那个位置太远了。
actors.hero.abilities.yuzu.pvp.short_desc=柚子向目标敌人发起_真人快打_PVP挑战，暂停其他所有敌人的行动。
actors.hero.abilities.yuzu.pvp.desc=柚子向目标敌人发起PVP挑战，该敌人必须在其他所有敌人时间停止的状态下与柚子战斗。\n\n目标必须在柚子5格以内可达的位置。效果持续10回合或直到敌人死亡，或柚子与敌人距离超过5格。\n\n时间停止的其他敌人不会受到任何伤害。柚子的友军不受影响，但指定Boss发起效果时，Boss召唤的杂兵也不受影响。
actors.hero.abilities.yuzu.pvp$duelparticipant.name=PVP对手
actors.hero.abilities.yuzu.pvp$duelparticipant.desc=该目标正在参与PVP。在其他所有敌人时间停止的状态下，只有该目标及其友军或召唤的杂兵可以正常行动。\n\nPVP持续到规定时间结束、或其中一名参与者死亡、或双方距离超过5格。\n\n剩余回合数：%d。
actors.hero.abilities.yuzu.cabinet.name=躲进柜子
actors.hero.abilities.yuzu.cabinet.short_desc=柚子可以_躲进柜子_，不受打扰地度过一段时间。
actors.hero.abilities.yuzu.cabinet.desc=柚子躲进柜子，持续20回合，期间对敌人不可见，无敌，也无法行动。
actors.hero.abilities.yuzu.vipmembership.name=VIP会员
actors.hero.abilities.yuzu.vipmembership.short_desc=柚子进入_VIP会员_模式，可购买特殊内容。
actors.hero.abilities.yuzu.vipmembership.desc=柚子进入VIP会员模式，获得30回合祝福和30点护盾，并获得10回合VIP会员模式，通过强化天赋可解锁并强化额外的可购买内容。
actors.hero.abilities.yuzu.vipmembership$vipbuff.name=VIP会员
actors.hero.abilities.yuzu.vipmembership$vipbuff.desc=已获得访问VIP内容的权限！\n\n剩余回合数：%s。


###npcs
actors.mobs.npcs.blacksmith.name=切里诺
actors.mobs.npcs.blacksmith.intro_quest_all=过来！我有命令！
actors.mobs.npcs.blacksmith.intro_quest_start=看到那边的梯子了吗？拿着这把镐头下去挖点_青辉石_来，如果不够_40个_的话就肃清你！下面的墙可以砸，好好干吧。\n\n什么，报酬？这...这家伙...\n\n…很好。我会特别允许你使用我们红冬事务局的铁匠铺。
actors.mobs.npcs.blacksmith.intro_quest_crystal=为了诸君的任务成功，我会亲自给你提示。那下面长满了水晶，虽然闪闪发光看起来很好，但很脆弱，没有用，而且还很有威胁。为了保护自己，还会使用奇怪的魔法。嗯，嗯，总之，_不管在哪里开采，保持警惕对人身安全有好处_，否则会引起它们的注意。\n\n矿山的某个地方应该有巨大的水晶，但那更危险，如果打算打碎它的话，最好做好准备再去。一旦打碎，就会使其他水晶的生长变慢，如果打碎了，我会亲自给你额外的报酬。
actors.mobs.npcs.blacksmith.intro_quest_fungi=为了诸君的任务成功，我会亲自给你提示。那里生长着一种像蘑菇怪物一样的东西，甚至还挂着蘑菇炮塔之类的东西，如果被发现的话会相当致命。虽然他们不能站起来，但至少可以追踪你的位置，如果你想活下去，最好尽可能地在他们的_视野之外_。\n\n如果你能设法干掉那里_最大的蘑菇_，那就多给点报酬吧。只是真的会很累。它连接着隐藏在墙上的许多菌丝节，如果真的想造成伤害的话，就得把它们全部打碎。
actors.mobs.npcs.blacksmith.intro_quest_gnoll=为了诸君的任务成功，我会亲自给你提示。几个豺狼人为了青辉石陷入了疯狂，开始破坏那里。因为他们是单纯又愚蠢的家伙，所以用那种方式开采，搞得到处都在崩塌。你得自己想办法挖青辉石出来，所以_最好找找近期松动塌落的岩石_。\n\n那些家伙中好像有一个特别会惹麻烦。大概是叫_地卜师_或者什么类似的东西吧。如果找到那个家伙并处理的话，我会给你更多的报酬。但我向你保证，它不是那么容易搞定的。
actors.mobs.npcs.blacksmith.reminder=快下去把青辉石拿来！慢的话就是肃清，肃清！
actors.mobs.npcs.blacksmith.lost_pick=你难道把我的镐子卖了吗？！如果你不快点的话，就肃清！
actors.mobs.npcs.blacksmith.quest_start_prompt=准备好了吗？背包里一定要留出能拿青辉石的空间。\n\n_我只放你下去一次！_
actors.mobs.npcs.blacksmith.enter_yes = 准备好了
actors.mobs.npcs.blacksmith.enter_no = 还没
actors.mobs.npcs.blacksmith.exit_warn_none = 这么快就结束了吗？办事真快。果然我的眼光...什么，你不是一块青辉石都没有嘛！不拿来_40个_的话就是肃清，肃清！\n\n_如果要放弃的话那也没办法，但我是不会让你再进来的！_
actors.mobs.npcs.blacksmith.exit_warn_low = 这么快就结束了吗？你看起来不像是拿到了那么多青辉石的样子。挖满_40个_！\n\n_如果要放弃的话那也没办法，但我是不会让你再进来的！_
actors.mobs.npcs.blacksmith.exit_warn_med = 结束了吗？至少好像是拿到了些青辉石了，但矿山里肯定还有很多青辉石...那也要拿_40个_！\n\n_如果要放弃的话那也没办法，但我是不会让你再进来的！_
actors.mobs.npcs.blacksmith.exit_warn_high = 结束了吗？虽然现在好像也带了很多青辉石，但还是得拿够_40个_...\n\n_如果要放弃的话那也没办法，但我是不会让你再进来的！_
actors.mobs.npcs.blacksmith.exit_warn_full = 结束了吗？哼哼哼...好吧，好吧。包里装满了青辉石。出来之前好好确认一下有没有遗漏的。\n\n_上来的话就不会再让你进去了，好好确认！_
actors.mobs.npcs.blacksmith.exit_warn_crystal = 那个巨大的水晶不是还留在下面嘛！如果你打碎它，我会给你更多的报酬。
actors.mobs.npcs.blacksmith.exit_warn_fungi = 那个巨大的蘑菇仍然留在下面。如果你把它处理掉的话，我会给你更多的报酬。
actors.mobs.npcs.blacksmith.exit_warn_gnoll = 下面不是还有个玩泥巴的算命先生嘛！处理完那个回来的话，我会给你更多的报酬。
actors.mobs.npcs.blacksmith.exit_yes=结束了
actors.mobs.npcs.blacksmith.exit_no=还没有
actors.mobs.npcs.blacksmith.get_lost=该办的事都办完了就告辞吧！
actors.mobs.npcs.blacksmith.entrance_blocked=下去的路被堵住了。
actors.mobs.npcs.blacksmith.cant_enter_old=那个地区在这次游戏中不能再去了。开始新游戏，尝试新任务！
actors.mobs.npcs.blacksmith.def_verb=“最好不要这样！”
actors.mobs.npcs.blacksmith.desc=红冬学院的学生会长长切里诺。即便无数次经历政变危机，她也是通过无数次肃清维持权力的可怕人物，只要将枪口对准目标，大喊“肃清！”，其便成为了红冬的肃清对象，其实对你没什么用。
actors.mobs.npcs.blacksmith.reminder_crystal=要带尽可能多的青辉石！...顺便打碎巨大水晶也不错。
actors.mobs.npcs.blacksmith.reminder_gnoll=要带尽可能多的青辉石！...顺便处理一下地卜师也不错。
actors.mobs.npcs.blacksmith.reminder_fungi=要带尽可能多的青辉石！...顺便处理一下大蘑菇也不错。

actors.mobs.npcs.shopkeeper.name=小空
actors.mobs.npcs.shopkeeper.thief=呀！有小偷！
actors.mobs.npcs.shopkeeper.warn=抱歉！在这里闹事的话，会很困扰的！
actors.mobs.npcs.shopkeeper.yell=啊啊啊！
actors.mobs.npcs.shopkeeper.flee=小空慌忙逃跑了。
actors.mobs.npcs.shopkeeper.flee_warning=小空按下警备呼叫按钮然后逃跑了！
actors.mobs.npcs.shopkeeper.sell=选择一件要出售的物品
actors.mobs.npcs.shopkeeper.talk=交谈
actors.mobs.npcs.shopkeeper.buyback=小空：“给，还给你，请在下次出售的时候小心点...”
actors.mobs.npcs.shopkeeper.talk_prison_intro=(看手机，摸鱼中）
actors.mobs.npcs.shopkeeper.talk_prison_aris=你好，爱丽丝！徽章不错！千年学院的标志和你真搭！
actors.mobs.npcs.shopkeeper.talk_prison_nonomi=啊，您好，野宫！哇，那张卡是...
actors.mobs.npcs.shopkeeper.talk_prison_miyako=哦，你好，宫子！又是来兼职帮忙的吗？哦，不是啊…
actors.mobs.npcs.shopkeeper.talk_prison_hoshino=啊，你好...哎，你不能在这里睡觉啦，星野！
actors.mobs.npcs.shopkeeper.talk_prison_shiroko=欢迎光临...呀！（瑟瑟发抖）这里没有多少钱，贵的（颤音）东西...都在别的地方...
actors.mobs.npcs.shopkeeper.talk_prison_noa=（慌忙藏起手机）哦，欢迎光临！需要些什么，诺亚小姐？
actors.mobs.npcs.shopkeeper.talk_prison_miyu=好无聊...哇，美游，从什么时候开始在那里的？
actors.mobs.npcs.shopkeeper.talk_prison_izuna=啊啊，泉奈！在店里飞来飞去的话会很困扰的！哇呀！
actors.mobs.npcs.shopkeeper.talk_caves=啊，欢迎光临，又见面了！请转一转再走吧。
actors.mobs.npcs.shopkeeper.talk_city=啊，你已经走到这儿了！这里一定有你需要的东西。
actors.mobs.npcs.shopkeeper.talk_halls=啊，您好！这里是最后一家便利店。如果有需要的话，最好提前准备。
actors.mobs.npcs.shopkeeper.talk_ascent=发生什么了？轰炸可猛烈了！快避难！
actors.mobs.npcs.shopkeeper.desc=在联邦理事会夏莱大楼一层便利店<天使24>的打工仔。平时一般很闲，所以经常偷懒。

actors.mobs.fox.fox.stats_desc=FOX小队成员对恐惧、恐慌、狂乱、被标记、困倦等负面效果免疫，而且无法成为友军。FOX小队会结伴行动，找不到敌人时会尝试回到一开始的位置。
actors.mobs.fox.yukino.name=雪乃
actors.mobs.fox.yukino.desc=SRT特殊学园3年级，FOX小队队长FOX 1-七度雪乃。\n\n雪乃装备_AR_。\n雪乃可进行_远程攻击_，_被近身_时也是如此。
actors.mobs.fox.yukino.show=FOX 1，作战准备完成，开始行动。
actors.mobs.fox.yukino.hit=FOX 1，报告受到攻击，需要支援。
actors.mobs.fox.yukino.die=……FOX 1，……撤退。
actors.mobs.fox.yukino.kill=失去作用的武器应当被废弃。
actors.mobs.fox.yukino.aggro=FOX 1，发现敌人，追踪。
actors.mobs.fox.niko.name=妮可
actors.mobs.fox.niko.desc=SRT特殊学园3年级，FOX小队FOX 2-吉野妮可。\n\n妮可装备_SG_。\n妮可只能进行_近身攻击_，但是_精准度_和_攻击伤害_都较高。\n妮可移动速度_非常快_，但HP相对_较少_。
actors.mobs.fox.niko.show=FOX 2，突击。
actors.mobs.fox.niko.hit=哎呀，果然如传闻所言相当危险呢，得小心点才行。
actors.mobs.fox.niko.die=作战……不能……
actors.mobs.fox.niko.kill=FOX 2，完成任务。
actors.mobs.fox.niko.aggro=FOX 2，发现敌人。
actors.mobs.fox.kurumi.name=胡桃
actors.mobs.fox.kurumi.desc=SRT特殊学园3年级，FOX小队FOX 3-高仓胡桃。\n\n胡桃装备_SMG_，但_似乎不会射击_，只能进行_近身攻击_。\n胡桃的_闪避_和_攻击伤害_ 较低，但是_HP_和_防御力_相对较高。
actors.mobs.fox.kurumi.show=FOX 3，突入！
actors.mobs.fox.kurumi.hit=你是认真的吧！
actors.mobs.fox.kurumi.die=竟然……这样……
actors.mobs.fox.kurumi.kill=稍微见识到特种部队的力量了吧？
actors.mobs.fox.kurumi.aggro=FOX 3，发现敌人！这边！
actors.mobs.fox.otogi.name=音葵
actors.mobs.fox.otogi.desc=SRT 特殊学园3年级，FOX小队FOX 4-天神山音葵。\n\n音葵装备 _SR_。\n音葵只能进行_远程攻击_，且_精准度_和_攻击伤害_较高。\n音葵的HP相对_较少_。
actors.mobs.fox.otogi.show=FOX 4，已部署。
actors.mobs.fox.otogi.hit=呃，受到攻击！请求支援！
actors.mobs.fox.otogi.die=先撤退吧……
actors.mobs.fox.otogi.kill=FOX 小队的胜利！耶~
actors.mobs.fox.otogi.aggro=FOX 4，目视到敌人！

