actors.buffs.rabbitsquadbuff$saki.name=咲
actors.buffs.rabbitsquadbuff$saki.desc=RABBIT 2, 咲。接到宫子的支援命令而来。\n\n咲目前持有_%1$d阶SMG+%2$d_，剩余的弹药为_%3$d/%4$d_。弹药耗尽后将消耗_%5$s回合_重新装填。\n\n咲会自动攻击进入视野的敌人，但会优先选择宫子攻击的目标。
actors.buffs.rabbitsquadbuff$sakicooldown.name=重新部署: 咲
actors.buffs.rabbitsquadbuff$sakicooldown.desc=咲体力耗尽，暂时撤退。需要休息一段时间后才能重新部署。\n\n剩余回合数: %s。
actors.buffs.rabbitsquadbuff$miyucooldown.name=重新部署: 美游
actors.buffs.rabbitsquadbuff$miyucooldown.desc=美游刚才进行了一次狙击，正在为下次射击作准备。\n\n剩余回合数: %s。
actors.buffs.rabbitsquadbuff$moeblastbuff.name=炮火轰炸
actors.buffs.rabbitsquadbuff$moeblastbuff.desc=正在进行炮火轰炸！\n\n放心啦，炮火每次会攻击距离宫子1格以外的敌人。\n\n剩余次数: %s。
actors.buffs.rabbitsquadbuff$moecooldown.name=重新部署: 萌绘
actors.buffs.rabbitsquadbuff$moecooldown.desc=萌绘正在重新装填爆炸物，需要一段时间才能再次轰炸。\n\n剩余回合数: %s。

actors.buffs.rabbitsquadbuff$moeenhance.name=更多炸药
actors.buffs.rabbitsquadbuff$moeenhance.desc=既然你拿不下，那我就帮你先收着啦。\n\n下次轰炸额外增加: _%1$d/%2$d_次。

actors.buffs.supportdrone.name=辅助攻击无人机
actors.buffs.supportdrone.desc=辅助攻击无人机在宫子周围盘旋，自动电击宫子攻击的敌人！\n\n消灭敌人后，无人机数量会增加。无人机会在受到敌人物理攻击时消耗，并减少50%%所受伤害。\n\n剩余数量: %d.

actors.hero.abilities.miyako.wirehook.name=铁丝钩爪
actors.hero.abilities.miyako.wirehook.short_desc=宫子使用铁丝钩爪_将远处的敌人拉至面前_。
actors.hero.abilities.miyako.wirehook.desc=宫子发射铁丝钩爪，将远处敌人拽至面前，并对其施加_5回合_残废。
actors.hero.abilities.miyako.wirehook.prompt=选择拖拽目标
actors.hero.abilities.miyako.wirehook.no_char=那里没有目标
actors.hero.abilities.miyako.wirehook.failed=拖拽失败
actors.hero.abilities.miyako.wirehook.cant_pull=那个目标无法被拖拽
actors.hero.abilities.miyako.wirehook.does_nothing=拖拽没有效果
actors.hero.abilities.miyako.wirehook$pointblankshot.name=近接射击
actors.hero.abilities.miyako.wirehook$pointblankshot.desc=宫子正集中精神锁定敌人露出的破绽，在近距离射击该敌人具有_3倍精准度_。\n\n剩余回合数：%s。
actors.hero.abilities.miyako.helicopter.name=搭乘直升机
actors.hero.abilities.miyako.helicopter.short_desc=宫子搭乘直升机，_移动至指定位置_。
actors.hero.abilities.miyako.helicopter.desc=宫子呼叫直升机并搭乘，无视障碍地移动到目标位置，但不能移动到正常情况下无法到达的位置，抵达后需要_5回合_着陆，期间无法行动。\n\n如果在目标位置有敌人，则改为正常消耗能量，并获得对该敌人的_3回合_灵视。
actors.hero.abilities.miyako.closeairsupport.name=空袭火力
actors.hero.abilities.miyako.closeairsupport.short_desc=宫子呼叫空中火力，对目标直线路径进行_地毯式轰炸_。
actors.hero.abilities.miyako.closeairsupport.desc=宫子呼叫空中火力覆盖，对从_当前位置前方一格_至目标位置的一整条直线路径进行_地毯式轰炸_。

###Hoshino 句子
actors.hero.heroclass.hoshino=星野
actors.hero.heroclass.hoshino_desc_short=呼哇，随便做做吧~摸鱼可是很重要的~\n\n难度：_简单_
actors.hero.heroclass.hoshino_desc=星野开局携带_镇压盾牌“铁荷鲁斯”_，使用后可部署盾牌，获得额外防御力，该效果在移动后会自动解除。若使用HG时部署盾牌，获得的防御力会减半，但移动不再解除效果。\n\n星野擅长SG，使用SG所需_力量减少 1_。\n\n星野在装填已装满子弹的枪械时，可以额外装填_1发_。\n\n星野初始携带一把_1阶SG_、校服、皮革水袋与丝绒袋。\n\n星野开局鉴定的物品有:\n _-_ 鉴定卷轴\n_-_ 治疗药剂\n_-_ 盛怒卷轴
actors.hero.heroclass.hoshino_unlock=星野自动解锁。

actors.hero.herosubclass.shield_bash=EX:盾牌冲撞
actors.hero.herosubclass.shield_bash_short_desc=星野在使用盾牌时_可短距离冲锋_，对敌人造成伤害并击退。
actors.hero.herosubclass.shield_bash_desc=星野使用盾牌冲锋，可在1回合内短距离冲刺，若移动后撞到敌人，则造成等于盾牌防御力的伤害，并将目标击退。冲刺后解除盾牌防御。\n\n若使用HG进行冲刺，则可冲刺_3_格并将敌人击退_2_格。\n\n若使用非HG进行冲刺，则可冲刺_1_格并将敌人击退_4_格。
actors.hero.herosubclass.swift_movement=EX:迅捷移动
actors.hero.herosubclass.swift_movement_short_desc=星野可以瞬间移动到附近位置并留下残影，_扰乱敌人_。
actors.hero.herosubclass.swift_movement_desc=星野可以移动到周围1格内的指定位置，并留下残影。敌人会优先攻击残影，残影受击时，视野内敌人的解除追踪状态。装填枪械后可再次使用此能力。

