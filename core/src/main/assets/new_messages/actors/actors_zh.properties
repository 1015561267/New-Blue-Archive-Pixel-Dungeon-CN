actors.buffs.supernovacharge.name=电池过载:超新星
actors.buffs.supernovacharge.desc=电池正在过载充能中！可消耗层数以加速光之剑冷却，或使其下次释放造成更高伤害。\n\n当前额外伤害量：%s%%。
actors.buffs.supernovacharge.action_name=电池过载！

actors.hero.talent.aris_t1_1.title=冒险启程
actors.hero.talent.aris_t1_1.desc=_+1:_近战攻击伤害_+1_。\n\n_+2:_近战攻击伤害_+2_。
actors.hero.talent.aris_t1_2.title=扫描
actors.hero.talent.aris_t1_2.desc=_+1:_近战武器与校服的鉴定速度_x2.5_。\n\n_+2:_近战武器与校服在装备时立即鉴定。
actors.hero.talent.aris_t1_3.title=好奇心
actors.hero.talent.aris_t1_3.desc=_+1:_鉴定药水或卷轴时获得_5_经验值。\n\n_+2:_鉴定药水或卷轴时获得_8_经验值。
actors.hero.talent.aris_t1_4.title=坚固防御
actors.hero.talent.aris_t1_4.desc=_+1:_徽章提供的护盾最大值_+1_。\n\n_+2:_徽章提供的护盾最大值_+2_。

actors.hero.talent.aris_t2_1.title=安全保险！
actors.hero.talent.aris_t2_1.desc=_+1:_进食只消耗1回合，进食期间获得_75%_的伤害抗性。\n\n_+2:_ 进食只消耗1回合，进食期间获得_100%_的伤害抗性。
actors.hero.talent.aris_t2_2.title=光哟！
actors.hero.talent.aris_t2_2.desc=_+1:_首次攻击敌人时，使敌人失明_2_回合。\n\n_2:_首次攻击敌人时，使敌人失明_3_回合。
actors.hero.talent.aris_t2_3.title=内存激活
actors.hero.talent.aris_t2_3.desc= _+1:_爱丽丝的千年徽章能像携带强化一样携带_普通、稀有、诅咒刻印_。\n\n_+2:_除+1的增益外，爱丽丝在升级防具时，正面刻印_不会消失_。
actors.hero.talent.aris_t2_4.title=作弊指令
actors.hero.talent.aris_t2_4.desc=+1: 平衡崩溃有_5%概率_造成等同于敌人当前HP的伤害。\n\n_+2:_ 平衡崩溃有_10%概率_造成等同于敌人当前HP的伤害。
actors.hero.talent.aris_t2_5.title=平衡调整
actors.hero.talent.aris_t2_5.desc=_+1:_平衡崩溃冷却时间减少_20%_。\n\n_+2:_平衡崩溃冷却时间减少_30%_。

actors.hero.talent.aris_t3_1.title=扫地机器人
actors.hero.talent.aris_t3_1.desc=_+1:_爱丽丝的移动速度_+5%_。\n\n_+2:_爱丽丝的移动速度_+10%_。\n\n_+3:_爱丽丝的移动速度_+15%_。
actors.hero.talent.aris_t3_2.title=跳过剧情
actors.hero.talent.aris_t3_2.desc=_+1:_进入新楼层时有_33%_概率揭示通往下一层的最短路径。\n\n_+2:_进入新楼层时有_67%_概率揭示通往下一层的最短路径。\n\n_+3:_进入新楼层时有_100%_概率揭示通往下一层的最短路径。

actors.hero.talent.aris_ex1_1.title=主力输出
actors.hero.talent.aris_ex1_1.desc=_+1:_当平衡崩溃就绪时，光之剑:超新星获得额外_+1_强化等级。\n\n_+2:_当平衡崩溃就绪时，光之剑:超新星获得额外_+2_强化等级。\n\n_+3:_当平衡崩溃就绪时，光之剑:超新星获得额外_+3_强化等级。
actors.hero.talent.aris_ex1_2.title=防御准备
actors.hero.talent.aris_ex1_2.desc=_+1:_当平衡崩溃冷却时，爱丽丝获得_1-4_点护甲。\n\n_+2:_当平衡崩溃冷却时，爱丽丝获得_2-8_点护甲。\n\n_+3:_当平衡崩溃冷却时，爱丽丝获得_3-12_点护甲。
actors.hero.talent.aris_ex1_3.title=超新星，觉醒！
actors.hero.talent.aris_ex1_3.desc=_+1:_当爱丽丝用光之剑:超新星近战命中敌人时，平衡崩溃冷却时间减少_1回合_。\n\n_+2:_当爱丽丝用光之剑:超新星近战命中敌人时，平衡崩溃冷却时间减少_2回合_。\n\n_+3:_当爱丽丝用光之剑:超新星近战命中敌人时，平衡崩溃冷却时间减少_3回合_。

actors.hero.talent.aris_ex2_1.title=平衡异常...
actors.hero.talent.aris_ex2_1.desc=_+1:_近战攻击命中时获得的过载层数变为_-1~+2_。\n\n_+2:_近战攻击命中时获得的过载层数变为_+0~+2_。\n\n_+3:_近战攻击命中时获得的过载层数变为_+1~+3_。
actors.hero.talent.aris_ex2_2.title=隐藏触发器
actors.hero.talent.aris_ex2_2.desc=_+1:_受到攻击时有_10%_概率格挡并立即反击。\n\n_+2:_受到攻击时有_20%_概率格挡并立即反击。\n\n_+3:_受到攻击时有_30%_概率格挡并立即反击。
actors.hero.talent.aris_ex2_3.title=主角光环
actors.hero.talent.aris_ex2_3.desc=_+1:_过载每有_100_层，戒指获得_+1_额外强化等级。\n\n_+2:_过载每有_50_层，戒指获得_+1_额外强化等级。\n\n_+3:_过载每有_30_层，戒指获得_+1_额外强化等级。\n\n此天赋最多提供+3额外强化等级。

actors.hero.talent.aris_armor1_1.title=过热抑制
actors.hero.talent.aris_armor1_1.desc=_+1:_被强化的平衡崩溃产生的冷却时间减少_13%_。\n\n_+2:_被强化的平衡崩溃产生的冷却时间减少_25%_。\n\n_+3:_被强化的平衡崩溃产生的冷却时间减少_38%_。\n\n_+4:_被强化的平衡崩溃产生的冷却时间减少_50%_。
actors.hero.talent.aris_armor1_2.title=能量护盾
actors.hero.talent.aris_armor1_2.desc=_+1:_被强化的平衡崩溃击中的每个敌人给爱丽丝赋予_2点护盾_。\n\n_+2:_被强化的平衡崩溃击中的每个敌人给爱丽丝赋予_4点护盾_。\n\n_+3:_被强化的平衡崩溃击中的每个敌人给爱丽丝赋予_6点护盾_。\n\n_+4:_被强化的平衡崩溃击中的每个敌人给爱丽丝赋予_8点护盾_。\n\n单次平衡崩溃最多触发此天赋8次。
actors.hero.talent.aris_armor1_3.title=光会让你...
actors.hero.talent.aris_armor1_3.desc=_+1:_被强化的平衡崩溃有_25%_概率点燃被击中的敌人。\n\n_+2:_被强化的平衡崩溃有_50%_概率点燃被击中的敌人。\n\n_+3:_被强化的平衡崩溃有_75%_概率点燃被击中的敌人。\n\n_+4:_被强化的平衡崩溃有_100%_概率点燃被击中的敌人。

actors.hero.talent.aris_armor2_1.title=庇护之力
actors.hero.talent.aris_armor2_1.desc=_+1:_发动Divi:Sion时爱丽丝获得_8_点护盾。\n\n_+2:_发动Divi:Sion时爱丽丝获得_16_点护盾。\n\n_+3:_发动Divi:Sion时爱丽丝获得_24_点护盾。\n\n_+4:_发动Divi:Sion时爱丽丝获得_32_点护盾。
actors.hero.talent.aris_armor2_2.title=汲取之力
actors.hero.talent.aris_armor2_2.desc=_+1:_在Divi:Sion持续期间腐化敌人时，爱丽丝获得_2_点治疗。\n\n_+2:_在Divi:Sion持续期间腐化敌人时，爱丽丝获得_4_点治疗。\n\n_+3:_在Divi:Sion持续期间腐化敌人时，爱丽丝获得_6_点治疗。\n\n_+4:_在Divi:Sion持续期间腐化敌人时，爱丽丝获得_8_点治疗。
actors.hero.talent.aris_armor2_3.title=绵延之力
actors.hero.talent.aris_armor2_3.desc=_+1:_在Divi:Sion持续期间腐化敌人时，延长其_2回合_持续时间。\n\n_+2:_在Divi:Sion持续期间腐化敌人时，延长其_4回合_持续时间。\n\n_+3:_在Divi:Sion持续期间腐化敌人时，延长其_6回合_持续时间。\n\n_+4:_在Divi:Sion持续期间腐化敌人时，延长其_8回合_持续时间。\n\n单次持续期间最多触发天赋触发8次。

actors.hero.talent.aris_armor3_1.title=高效电池
actors.hero.talent.aris_armor3_1.desc=_+1:_更换电池后释放的平衡崩溃冷却时间减少_10回合_。\n\n_+2:_更换电池后释放的平衡崩溃冷却时间减少_20回合_。\n\n_+3:_更换电池后释放的平衡崩溃冷却时间减少_30回合_。\n\n_+4:_更换电池后释放的平衡崩溃冷却时间减少_40回合_。
actors.hero.talent.aris_armor3_2.title=性能电池
actors.hero.talent.aris_armor3_2.desc=_+1:_更换电池后释放的平衡崩溃伤害增加_10%_。\n\n_+2:_更换电池后释放的平衡崩溃伤害增加_20%_。\n\n_+3:_更换电池后释放的平衡崩溃伤害增加_30%_。\n\n_+4:_更换电池后释放的平衡崩溃伤害增加_40%_。
actors.hero.talent.aris_armor3_3.title=快速更换
actors.hero.talent.aris_armor3_3.desc=_+1:_更换电池时有_25%_概率不消耗回合。\n\n_+2:_更换电池时有_50%_概率不消耗回合。\n\n_+3:_更换电池时有_75%_概率不消耗回合。\n\n_+4:_更换电池时有_100%_概率不消耗回合。

actors.hero.abilities.aris.extendedlaser.name=增强激光
actors.hero.abilities.aris.extendedlaser.short_desc=爱丽丝为光之剑:超新星安装一次性组件，_大幅强化下一次平衡崩溃_。
actors.hero.abilities.aris.extendedlaser.desc=爱丽丝为光之剑:超新星安装一次性组件，使下次平衡崩溃的激光宽度增至3倍，射程增至2倍。（但是冷却时间翻倍）
actors.hero.abilities.aris.extendedlase.cooldown=在光之剑:超新星过热的情况下无法安装零件。
actors.hero.abilities.aris.extendedlaser.already_used=已经安装了组件！
actors.hero.abilities.aris.extendedlaser$extendedlaserbuff.name=增强激光
actors.hero.abilities.aris.extendedlaser$extendedlaserbuff.desc=扩展激光就绪！危险，请暂时躲在那边。\n\n下次发射的激光的宽度x3，距离x2。

actors.hero.abilities.aris.division.name=Divi:Sion
actors.hero.abilities.aris.division.short_desc=爱丽丝觉醒王女之力，可短暂浮空并_腐化被击杀的敌人_。
actors.hero.abilities.aris.division.desc=爱丽丝在20回合内觉醒无名诸神的王女之力，可浮空移动并将击杀的敌人腐化为友军。
actors.hero.abilities.aris.division.aready_activated=无法再次使用！
actors.hero.abilities.aris.division$divisionbuff.name=无名诸神的王女
actors.hero.abilities.aris.division$divisionbuff.desc=Key的人格暂时觉醒了。期间可以飞行并将击杀的敌人腐化为友军。\n\n剩余回合：%s。

actors.hero.abilities.aris.batterychange.name=更换电池
actors.hero.abilities.aris.batterychange.short_desc=爱丽丝在平衡崩溃冷却期间更换电池，_立即结束技能冷却_。
actors.hero.abilities.aris.batterychange.desc=爱丽丝通过更换光之剑：超新星的电池，立即结束平衡崩溃冷却。

###Nonomi sentences
actors.hero.heroclass.nonomi=野宫
actors.hero.heroclass.nonomi_desc_short=老师！今天也是美好的一天~有什么事的话就交给我吧。\n\n难度: _简单_
actors.hero.heroclass.nonomi_desc=野宫每击杀一个敌人，通过持续的资产投资，拥有的信用点就会增加1%。\n\n野宫擅长使用MG（机枪），使用MG的力量需求-1。\n\n野宫初始携带一挺_1阶MG_、校服、皮革水袋与丝绒袋。\n\n野宫开局鉴定的物品有:\n _-_ 鉴定卷轴\n_-_ 治疗药剂\n_-_ 盛怒卷轴
actors.hero.heroclass.nonomi_unlock=野宫自动解锁。

actors.hero.herosubclass.shoot_all=EX: 全弹发射
actors.hero.herosubclass.shoot_all_short_desc=野宫可以一次性倾泻_已装载的所有弹药_。
actors.hero.herosubclass.shoot_all_desc=野宫可以通过右下角技能按钮来选择启用/关闭全弹发射模式。\n\n全弹发射状态下会一次性发射当前装备枪械剩余的所有子弹来集中攻击一个目标。\n\n全弹发射后触发过热效果，短时间内无法更换武器或继续射击。
actors.hero.herosubclass.spread_shot=EX: 惩罚时间到～♣
actors.hero.herosubclass.spread_shot_short_desc=野宫向扇形范围扫射，_对区域内敌人造成伤害_。
actors.hero.herosubclass.spread_shot_desc=使用右下角技能按钮以选定一个方向，野宫向该方向的扇形范围扫射子弹，对区域内的多个敌人造成一次伤害。\n\n扇形区域的角度与瞄准距离和枪支射击次数有关，距离越远角度越窄，射击次数越多角度越宽。

actors.hero.hero.nonomi_push=不可以哦！
actors.hero.hero.nonomi_spread_no_gun=哎呀，我忘了拿枪了~得先装备一把枪支。

actors.buffs.shootallbuff.action_name_off=全弹发射.禁用
actors.buffs.shootallbuff.action_name_on=全弹发射.激活
