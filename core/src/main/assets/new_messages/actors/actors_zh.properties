actors.hero.hero.hoshino_health_critical_2=喂~能不能找个地方睡一觉？
actors.hero.hero.hoshino_health_critical_3=我说啊，你好像对我太粗暴了，别这样嘛。

actors.hero.hero.hoshino_health_warn_1=不累吗~？去那边睡个午觉吧~
actors.hero.hero.hoshino_health_warn_2=睡会儿再走吧~嗯~？
actors.hero.hero.hoshino_health_warn_3=好累~好困~休息吧~

actors.hero.hero.hoshino_die=没想到会这样……

actors.hero.hero.hoshino_enemy_defeated_1=没用的。
actors.hero.hero.hoshino_enemy_defeated_2=呼啊~胜利胜利~
actors.hero.hero.hoshino_enemy_defeated_3=没用的啦~
actors.hero.hero.hoshino_enemy_defeated_4=呼啊~差不多赢了。
actors.hero.hero.hoshino_enemy_defeated_5=哎呀~好麻烦-

