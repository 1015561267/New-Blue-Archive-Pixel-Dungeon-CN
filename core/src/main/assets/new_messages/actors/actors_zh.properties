actors.hero.talent.nonomi_t1_3.title=冲击子弹
actors.hero.talent.nonomi_t1_3.desc=_+1:_子弹伤害_+0~1_。\n\n_+2:_子弹伤害_+1_。
actors.hero.talent.nonomi_t1_4.title=安全区域
