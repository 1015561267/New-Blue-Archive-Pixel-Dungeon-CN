actors.hero.talent.shiroko_t1_1.title=稍作休息……
actors.hero.talent.shiroko_t1_1.desc=_+1:_进食时恢复_1点生命值_。\n\n_+2:_进食时恢复_2点生命值_。
actors.hero.talent.shiroko_t1_2.title=突击步枪专家
actors.hero.talent.shiroko_t1_2.desc=_+1:__装备AR时_能将其立即鉴定。\n\n_+2:__捡起AR时_能将其立即鉴定。
actors.hero.talent.shiroko_t1_3.title=强化爆炸
actors.hero.talent.shiroko_t1_3.desc=_+1:_子弹的爆炸效果的伤害值_+1_。\n\n_+2:_子弹的爆炸效果的伤害值_+2_。
actors.hero.talent.shiroko_t1_4.title=反馈护盾
actors.hero.talent.shiroko_t1_4.desc=_+1:_击败敌人时获得_5点护盾_。\n\n_+2:_击败敌人时获得_8点护盾_。

actors.hero.talent.shiroko_t2_1.title=重新振作
actors.hero.talent.shiroko_t2_1.desc=_+1:_进食仅消耗1回合，并获得_2回合_极速。\n\n_+2:_进食仅消耗1回合，并获得_3回合_极速。
actors.hero.talent.shiroko_t2_2.title=能量饮料
actors.hero.talent.shiroko_t2_2.desc=_+1:_白子饮用或投掷一瓶药剂、魔药或秘药时，恢复自行车_20点充能_。\n\n_+2:_白子饮用或投掷一瓶药剂、魔药或秘药时，恢复自行车_30点充能_。\n\n如果使用的是力量药剂、经验药剂或须用前述药剂炼制的炼金物品，则自行车恢复的能量翻倍。\n\n对产量较高的炼金物品(如水爆魔药)，这项天赋会基于该物品的单次产出数量使自行车恢复对应比例的充能。
actors.hero.talent.shiroko_t2_3.title=野性本能
actors.hero.talent.shiroko_t2_3.desc=_+1:_白子站在草丛格子上时，对周围_3格_的灵视。\n\n_+2:_白子站在草丛格子上时，对周围_5格_的灵视。
actors.hero.talent.shiroko_t2_4.title=开锁？不，爆破
actors.hero.talent.shiroko_t2_4.desc=_+1:__白子的炸弹爆炸可以打开锁住的门_。\n\n_+2:_在+1基础上，首次进入楼层时，_揭示锁住的门周围3x3的区域_。\n\n该天赋对水晶门无效。
actors.hero.talent.shiroko_t2_5.title=自行发电
actors.hero.talent.shiroko_t2_5.desc=_+1:_使用自行车或用自行车移动一格时，法杖获得_0.05_点充能。\n\n_+2:_使用自行车或用自行车移动一格时，法杖获得_0.08_点充能。

actors.hero.talent.shiroko_t3_1.title=骑乘平衡
actors.hero.talent.shiroko_t3_1.desc=_+1:_骑乘自行车时精准度补正由-50%变为_-25%_。\n\n_+2:_骑乘自行车时精准度补正由-50%变为_0%_。\n\n_+3:_骑乘自行车时精准度补正由-50%变为_+25%_。
actors.hero.talent.shiroko_t3_2.title=追踪子弹
actors.hero.talent.shiroko_t3_2.desc=_+1:_白子获得对子弹命中的敌人_10回合_灵视。\n\n_+2:_白子获得对子弹命中的敌人_20回合_灵视。\n\n_+3:_白子获得对子弹命中的敌人_30回合_灵视。

actors.hero.talent.shiroko_ex1_1.title=快速充电
actors.hero.talent.shiroko_ex1_1.desc=_+1:_自行车充能速度_+17%_。\n\n_+2:_自行车充能速度_+33%_。\n\n_+3:_自行车充能速度_+50%_。
actors.hero.talent.shiroko_ex1_2.title=残影
actors.hero.talent.shiroko_ex1_2.desc=_+1:_骑乘自行车时，闪避值增加相当于额外移速的_17%_。\n\n_+2:_骑乘自行车时，闪避值增加相当于额外移速的_33%_。\n\n_+3:_骑乘自行车时，闪避值增加相当于额外移速的_50%_。\n\n移动速度低于正常时，该天赋不会减少闪避。
actors.hero.talent.shiroko_ex1_3.title=回响驱动
actors.hero.talent.shiroko_ex1_3.desc=_+1:_骑行动作的充能消耗_-17%_。\n\n_+2:_骑行动作的充能消耗_-33%_。\n\n_+3:_骑行动作的充能消耗_-50%_。

actors.hero.talent.shiroko_ex2_1.title=劫持人质
actors.hero.talent.shiroko_ex2_1.desc=_+1:_若视野内敌人数量≥2，使用能力会对相邻敌人施加1回合麻痹，已处于恐惧状态的敌人有_20%_概率无条件进入魂飞魄散状态。\n\n_+2:_若视野内敌人数量≥2，使用能力会对相邻敌人施加1回合麻痹，已处于恐惧状态的敌人有_40%_概率无条件进入魂飞魄散状态。\n\n_+3:_若视野内敌人数量≥2，使用能力会对相邻敌人施加1回合麻痹，已处于恐惧状态的敌人有_60%_概率无条件进入魂飞魄散状态。
actors.hero.talent.shiroko_ex2_2.title=嗯，把值钱的全交出来
actors.hero.talent.shiroko_ex2_2.desc=_+1:_进入魂飞魄散状态的敌人有_+33%_概率掉落物品。\n\n_+2:_进入魂飞魄散状态的敌人有_+67%_概率掉落物品。\n\n_+3:_进入魂飞魄散状态的敌人有_+100%_概率掉落物品。
actors.hero.talent.shiroko_ex2_3.title=抢劫专家
actors.hero.talent.shiroko_ex2_3.desc=_+1:_在商店使用能力，小空会逃跑，所有物品免费，并有_100%_概率召唤FOX小队攻击你。\n\n_+2:_在商店使用能力，小空会逃跑，所有物品免费，并有_80%_概率召唤FOX小队攻击你。\n\n_+3:_在商店使用能力，小空会逃跑，所有物品免费，并有_60%_概率召唤FOX小队攻击你。

actors.hero.talent.shiroko_armor1_1.title=障碍穿透
actors.hero.talent.shiroko_armor1_1.desc=_+1:_技能射击的精准度_+25%_，可穿透_2格_硬质地形。\n\n_+2:_技能射击的子弹精准度_+50%_，可穿透_4格_硬质地形。\n\n_+3:_技能射击的子弹精准度_+75%_，可穿透_6格_硬质地形。\n\n_+4:_技能射击的子弹精准度_+100%_，可穿透_8格_硬质地形。
actors.hero.talent.shiroko_armor1_2.title=破甲射击
actors.hero.talent.shiroko_armor1_2.desc=_+1:_技能射击有_25%_概率无视敌人防御力并对其施加10回合易伤。\n\n_+2:_技能射击有_50%_概率无视敌人防御力并对其施加10回合易伤。\n\n_+3:_技能射击有_75%_概率无视敌人防御力并对其施加10回合易伤。\n\n_+4:_技能射击有_100%_概率无视敌人防御力并对其施加10回合易伤。
actors.hero.talent.shiroko_armor1_3.title=分裂子弹
actors.hero.talent.shiroko_armor1_3.desc=_+1:_技能射击分成_2次攻击_命中敌人，单次伤害_-45%_。\n\n_+2:_技能射击分成_3次攻击_命中敌人，单次伤害_-60%_。\n\n_+3:_技能射击分成_4次攻击_命中敌人，单次伤害_-68%_。\n\n_+4:_技能射击分成_5次攻击_命中敌人，单次伤害_-72%_。

actors.hero.talent.shiroko_armor2_1.title=强力手雷
actors.hero.talent.shiroko_armor2_1.desc=_+1:_手雷伤害_+25%_，弱化持续时间_+30%_。\n\n_+2:_手雷伤害_+50%_，弱化持续时间_+50%_。\n\n_+3:手雷伤害_+75%_，弱化持续时间_+80%_。\n\n_+4:_手雷伤害_+100%_，弱化持续时间_+100%_。
actors.hero.talent.shiroko_armor2_2.title=闪光手雷
actors.hero.talent.shiroko_armor2_2.desc=_+1:_手雷还会有_30%_概率致盲敌人5回合。\n\n_+2:_手雷有_60%_概率致盲敌人5回合。\n\n_+3:_手雷有_90%_概率致盲敌人5回合。\n\n_+4:_手雷有_100%_概率致盲敌人5回合，且有_20%_几率对敌人施加等长的麻痹。
actors.hero.talent.shiroko_armor2_3.title=熟练动作
actors.hero.talent.shiroko_armor2_3.desc=_+1:_投掷手雷的同时装填_1发_子弹，而且投掷手雷本身有_25%_概率不消耗回合。\n\n_+2:_投掷手雷的同时装填_2发_子弹，而且投掷手雷本身有_50%_概率不消耗回合。\n\n_+3:_投掷手雷的同时装填_3发_子弹，而且投掷手雷本身有_75%_概率不消耗回合。\n\n_+4:_投掷手雷的同时装填_4发_子弹，而且投掷手雷本身有_100%_概率不消耗回合。\n\n该效果装填的子弹可超过容量上限，但若弹夹已满，则不会额外装填。

actors.hero.talent.shiroko_armor3_1.title=回到起点
actors.hero.talent.shiroko_armor3_1.desc=_+1:_在已激活路径存在期间再次使用能力，可立即返回第一次使用能力的位置。若在路径上使用能力，消耗的充能还会_-30%_。\n\n_+2:_在已激活路径存在期间再次使用能力，可立即返回第一次使用能力的位置。若在路径上使用能力，消耗的充能还会_-51%_。\n\n_+3:_在已激活路径存在期间再次使用能力，可立即返回第一次使用能力的位置。若在路径上使用能力，消耗的充能还会_-66%_。\n\n_+4:_在已激活路径存在期间再次使用能力，可立即返回第一次使用能力的位置。若在路径上使用能力，消耗的充能还会_-76%_。
actors.hero.talent.shiroko_armor3_2.title=重规划延迟
actors.hero.talent.shiroko_armor3_2.desc=_+1:_路径持续时间_+25%_。\n\n_+2:_路径持续时间_+50%_。\n\n_+3:_路径持续时间_+75%_。\n\n_+4:_路径持续时间_+100%_。
actors.hero.talent.shiroko_armor3_3.title=抄条捷径
actors.hero.talent.shiroko_armor3_3.desc=_+1:_使用能力时揭示_力量药剂_的位置。\n\n_+2:_在+1基础上，使用能力时揭示_升级卷轴_的位置。\n\n_+3:_在+2基础上，使用能力时揭示_经验药剂_的位置。\n\n_+4:_在+3基础上，使用能力时揭示_嬗变卷轴_的位置。

actors.hero.abilities.shiroko.penetrationshot.name=穿透射击
actors.hero.abilities.shiroko.penetrationshot.short_desc=白子可以发射子弹，_对路径上所有敌人_造成伤害。
actors.hero.abilities.shiroko.penetrationshot.desc=白子使用穿透射击，用当前枪械向指定位置射出1发子弹，对路径上所有敌人造成子弹命中伤害。\n\n使用穿透射击需要装备枪械，且至少装填1发子弹。
actors.hero.abilities.shiroko.penetrationshot.prompt=选择射击位置
actors.hero.abilities.shiroko.penetrationshot.need_gun=需要装备枪械！
actors.hero.abilities.shiroko.penetrationshot.no_rounds=没有子弹。
actors.hero.abilities.shiroko.weakeninggrenade.name=弱化手雷
actors.hero.abilities.shiroko.weakeninggrenade.short_desc=白子可以向指定位置投掷_手雷_造成伤害。
actors.hero.abilities.shiroko.weakeninggrenade.desc=白子在骑乘自行车时可向指定位置投掷必中的手雷，在小范围内造成即时伤害并对被波及到的敌人施加10回合弱化。手雷可越过敌人投掷。
actors.hero.abilities.shiroko.weakeninggrenade.cannot_self=最好不要向自己投掷。
actors.hero.abilities.shiroko.gpsroute.name=GPS导航
actors.hero.abilities.shiroko.gpsroute.short_desc=白子可以_探索通往下一层的最快路径_，并以极快速度沿路径移动。
actors.hero.abilities.shiroko.gpsroute.desc=白子使用GPS导航，探索并标记从当前位置到下一层的最快路径。\n\n导航持续8回合，站在被标记的路径上时，不会消耗持续时间，且移动速度变为3倍。\n\n在该效果已激活时无法再次使用。
actors.hero.abilities.shiroko.gpsroute.already_active=已有激活的路径。
actors.hero.abilities.shiroko.gpsroute.cannot_use=无法这样做。
actors.hero.abilities.shiroko.gpsroute$routebuff.name=GPS导航
actors.hero.abilities.shiroko.gpsroute$routebuff.desc=嗯，现在看到的这条路似乎就是通往下一层的最短路径。\n\n沿这条路走会快很多。如果离开路径或时间过长，找到的路径就会消失。\n\n大概离开路径_%s回合_也还可以。

###Noa
actors.hero.heroclass.noa=诺亚
actors.hero.heroclass.noa_desc_short=研讨会的书记，生盐诺亚。请多关照，老师。……各种意义上。\n\n难度：_普通_
actors.hero.heroclass.noa_desc=诺亚开局携带_转换套件_，可安装在枪械上提升性能。转换套件可以在枪械之间转移，并可以携带_1级强化等级_。\n\n诺亚擅长HG，使用HG所需_力量减少 1_。\n\n具有快速判断力的诺亚_能一次探索更大范围_。\n\n诺亚初始携带一把_1 阶HG_、校服、皮革水袋与丝绒袋。\n\n诺亚开局鉴定的物品有:\n _-_ 鉴定卷轴\n_-_ 治疗药剂\n_-_ 盛怒卷轴
actors.hero.heroclass.noa_unlock=诺亚自动解锁。

actors.hero.herosubclass.double_barrel=双管齐下
actors.hero.herosubclass.double_barrel_short_desc=诺亚可以装备HG作为副武器，_射击命中后立即发射副武器_。
actors.hero.herosubclass.double_barrel_desc=诺亚可以额外装备一把HG作为副武器。\n\n子弹命中后，可以对该敌人不消耗回合地发射副武器，造成67%伤害。\n\n手动装填副武器将额外消耗1回合。
actors.hero.herosubclass.conversation=理性而合理的对话
actors.hero.herosubclass.conversation_short_desc=诺亚可以对指定敌人发起理性而合理的对话，_对其施加随机减益效果或将其变为友军_。
actors.hero.herosubclass.conversation_desc=诺亚与指定目标交谈，对其施加眩晕、失明、困倦、魅惑、狂乱、恍惚中的一种，削弱敌人。减益效果的持续时间随诺亚等级提升而延长，若敌人无法被施加更多负面效果，则使用能力可使其沉沦，变为友军。

actors.hero.hero.noa_health_critical_1=有点危险，也许……不好说呢……
