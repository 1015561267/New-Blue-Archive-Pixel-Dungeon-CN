actors.hero.talent.nonomi_armor3_1.desc=_+1:_在技能效果持续期间，每_8回合_给当前枪支自动装填一发子弹。\n\n_+2:_在技能效果持续期间，每_7回合_给当前枪支自动装填一发子弹。\n\n_+3:_在技能效果持续期间，每_6回合_给当前枪支自动装填一发子弹。\n\n_+4:_在技能效果持续期间，每_5回合_给当前枪支自动装填一发子弹。
actors.hero.talent.nonomi_armor3_2.title=稳定射击
