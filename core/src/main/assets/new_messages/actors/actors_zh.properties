actors.hero.talent.nonomi_t1_1.title=休息时间
actors.hero.talent.nonomi_t1_1.desc=_+1:_野宫进食时若剩余HP低于40%，则恢复_3_点HP。\n\n_+2:_野宫进食时若剩余HP低于40%，则恢复_5_点HP。
