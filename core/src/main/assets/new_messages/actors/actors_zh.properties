actors.hero.talent.nonomi_t2_3.title=人气之星
actors.hero.talent.nonomi_t2_3.desc=_+1:_野宫的视野内每存在1名敌人，所受伤害_-5%_。\n\n_+1:_野宫的视野内每存在1名敌人，所受伤害_-7.5%_。
actors.hero.talent.nonomi_t2_4.title=惊喜攻势
