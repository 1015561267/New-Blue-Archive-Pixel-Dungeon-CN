actors.hero.talent.nonomi_t3_1.title=专属武器
actors.hero.talent.nonomi_t3_1.desc=_+1:_获得野宫专用的特殊MG。\n\n_+2:_特殊MG获得_+1_额外强化等级。\n\n_+3:_特殊MG获得_+2_额外强化等级。
actors.hero.talent.nonomi_t3_2.title=自动供弹
actors.hero.talent.nonomi_t3_2.desc=_+1:_每回合有_5%_概率给当前枪支自动装填一发子弹。\n\n_+2:_每回合有_10%_概率给当前枪支自动装填一发子弹。\n\n_+3:_每回合有_15%_概率给当前枪支自动装填一发子弹。\n\n当前装备枪支弹夹已满时无效。

actors.hero.talent.nonomi_ex1_1.title=扩展弹匣
actors.hero.talent.nonomi_ex1_1.desc=_+1:_枪支的弹夹上限_+1发_，但是装填时间增加1回合。\n\n_+2:_枪支的弹夹上限_+2发_，但是装填时间增加1回合。\n\n_+3:_枪支的弹夹上限_+3发_，但是装填时间增加1回合。
actors.hero.talent.nonomi_ex1_2.title=冷却方案
actors.hero.talent.nonomi_ex1_2.desc=_+1:_在过热状态下近战攻击敌人，有_33%_概率使过热时间减少1回合。\n\n_+2:_在过热状态下近战攻击敌人，有_67%_概率使过热时间减少1回合。\n\n_+3:_在过热状态下近战攻击敌人，有_100%_概率使过热时间减少1回合。
actors.hero.talent.nonomi_ex1_3.title=热能传导
actors.hero.talent.nonomi_ex1_3.desc=_+1:_在过热状态下近战攻击敌人，有_过热剩余回合数x10%_的概率将其点燃。\n\n_+2:_在过热状态下近战攻击敌人，有_(过热剩余回合数+1)x10%_的概率将其点燃。\n\n_+3:_在过热状态下近战攻击敌人，有_(过热剩余回合数+2)x10%_的概率将其点燃。

