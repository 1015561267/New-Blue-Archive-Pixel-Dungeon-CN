actors.hero.hero.hoshino_levelup_rare=呼嗯。也许还不错。别看我这样，其实在逐渐变强哦。

actors.hero.talent.hoshino_t1_1.title=应急处理
actors.hero.talent.hoshino_t1_1.desc=_+1:_在血量不足25%时受到攻击会立刻恢复_4点生命值_。\n\n_+2:_在血量不足25%时受到攻击会立刻恢复_6点生命值_。\n\n该效果有50回合的冷却时间。
actors.hero.talent.hoshino_t1_2.title=霰弹枪专家
actors.hero.talent.hoshino_t1_2.desc=_+1:__装备SG时_能将其立即鉴定。\n\n_+2:__捡起SG时_能将其立即鉴定。
actors.hero.talent.hoshino_t1_3.title=轻装防护
actors.hero.talent.hoshino_t1_3.desc=_+1:__3阶_及以下的防具所提供的防御力上限_+2_。\n\n_+2:__3阶_及以下的防具所提供的防御力上限_+3_。
actors.hero.talent.hoshino_t1_4.title=熟练装填
actors.hero.talent.hoshino_t1_4.desc=_+1:_在子弹耗尽时进行装填，获得_3点_护盾。\n\n_+2:_在子弹耗尽时进行装填，获得_5点_护盾。

actors.hero.talent.hoshino_t2_1.title=一吃饱就犯困...
actors.hero.talent.hoshino_t2_1.desc=_+1:_进食只消耗1回合，且进食时_获得250回合困倦，结束时进入睡眠以快速恢复体力_。\n\n_+2:_进食只消耗1回合，且进食时_获得150回合困倦，结束时进入睡眠以快速恢复体力_。\n\n困倦期间再次进食不会刷新剩余时间。
actors.hero.talent.hoshino_t2_2.title=太阳之眼
actors.hero.talent.hoshino_t2_2.desc=_+1:_阅读卷轴后，搜索周围_8格_。\n\n_+2:_阅读卷轴后，搜索周围_12格_。\n\n如果使用的是升级卷轴、嬗变卷轴或须用前述卷轴炼制的炼金物品，则搜索距离翻倍。\n\n对产量较高的炼金物品(如大多数结晶)，该特性根据产物的数量调整搜索距离。
actors.hero.talent.hoshino_t2_3.title=残月之眼
actors.hero.talent.hoshino_t2_3.desc=_+1:_获得对_周围2格范围_的灵视。\n\n_+2:_获得对_周围3格范围_的灵视。
actors.hero.talent.hoshino_t2_4.title=屏障展开
actors.hero.talent.hoshino_t2_4.desc=_+1:_镇压盾牌“钢铁荷鲁斯”生效时，获得等同于其提供额外防御力_50%_的魔法防御。\n\n_+2:_镇压盾牌“钢铁荷鲁斯”生效时，获得等同于其提供额外防御力_75%_的魔法防御。
actors.hero.talent.hoshino_t2_5.title=先发制人
actors.hero.talent.hoshino_t2_5.desc=_+1:_击败敌人后，接下来_2发_子弹的伤害+1。\n\n_+2:_击败敌人后，接下来_3发_子弹的伤害+1。\n\n射击次数只能刷新而不能叠加，但是子弹伤害加成可以最多叠加至10点。用子弹击败敌人时，获得的射击次数减少 1。\n\n(截至1.2.0版本)由于cocoa忘了删除旧版本该天赋的效果，所以星野还会在没有护盾且子弹击中敌人时获得至多5/8点护盾，与敌人每有1格距离，获得的护盾数值-1。
actors.hero.talent$intimidatebonusdamagebuff.name=子弹伤害增加
actors.hero.talent$intimidatebonusdamagebuff.desc=暂时提升子弹伤害，每次子弹命中敌人时效果次数减少。\n\n伤害增加量：%1$d。\n剩余次数：%2$d。

actors.hero.talent.hoshino_t3_1.title=战术镇压
actors.hero.talent.hoshino_t3_1.desc=_+1:_星野在对被子弹命中敌人进行的下一次近战攻击将处决_生命值低于7%_的非Boss敌人。\n\n_+2:_星野在对被子弹命中敌人进行的下一次近战攻击将处决_生命值低于13%_的非Boss敌人。\n\n_+3:_星野在对被子弹命中敌人进行的下一次近战攻击将处决_生命值低于20%_的非Boss敌人。
actors.hero.talent.hoshino_t3_2.title=熟练镇压
actors.hero.talent.hoshino_t3_2.desc=_+1:_星野对相邻敌人射击的子弹精准度_+50%_。\n\n_+2:_星野对相邻敌人射击的子弹精准度_+100%_。\n\n_+3:_星野对相邻敌人射击的子弹精准度_+150%_。

actors.hero.talent.hoshino_ex1_1.title=强力冲击
actors.hero.talent.hoshino_ex1_1.desc=_+1:_对被击退的敌人施加_2回合_的眩晕与_防御-1_的破甲效果。\n\n_+2:_对被击退的敌人施加_4回合_的眩晕与_防御-2_的破甲效果。\n\n_+3:_对被击退的敌人施加_6回合_的眩晕与_防御-3_的破甲效果。
actors.hero.talent.hoshino_ex1_2.title=盾牌猛击
actors.hero.talent.hoshino_ex1_2.desc=_+1:_盾牌冲撞对敌人造成的伤害_+50%_，但星野也会受到_4-10_点伤害。\n\n_+2:_盾牌冲撞对敌人造成的伤害_+100%_，但星野也会受到_8-20_点伤害。\n\n_+3:_盾牌冲撞对敌人造成的伤害_+150%_，但星野也会受到_12-30_点伤害。\n\n星野受到的伤害可被自身防御力减免。
actors.hero.talent.hoshino_ex1_3.title=瞬间专注
actors.hero.talent.hoshino_ex1_3.desc=_+1:_盾牌冲撞击退敌人后，5回合内的下一次近战攻击_精准度x2_。\n\n_+2:_盾牌冲撞击退敌人后，5回合内的下一次近战攻击_精准度x5_。\n\n_+3:_盾牌冲撞击退敌人后，5回合内的下一次近战攻击_必中_。

actors.hero.talent.hoshino_ex2_1.title=战术后撤
actors.hero.talent.hoshino_ex2_1.desc=_+1:_残影受击时，若星野视野内的敌人_≥4个_，则星野获得_5回合隐身_。\n\n_+2:_残影受击时，若星野视野内的敌人_≥3个_，则星野获得_5回合隐身_。\n\n_+3:_残影受击时，若星野视野内的敌人_≥2个_，则星野获得_5回合隐身_。
actors.hero.talent.hoshino_ex2_2.title=露出破绽
actors.hero.talent.hoshino_ex2_2.desc=_+1:_攻击残影的敌人被标记，星野下次攻击该敌人时，若其生命值低于_13%_则将其处决。\n\n_+2:_攻击残影的敌人被标记，星野下次攻击该敌人时，若其生命值低于_27%_则将其处决。\n\n_+3:_攻击过残影的敌人被标记，星野下次攻击该敌人时，若其生命值低于_40%_则将其处决。
actors.hero.talent.hoshino_ex2_3.title=爆炸诡雷
actors.hero.talent.hoshino_ex2_3.desc=_+1:_残影每次受击时会爆炸，对周围敌人造成_3_点伤害。\n\n_+2:_残影每次受击时会爆炸，对周围敌人造成_5_点伤害。\n\n_+3:_残影每次受击时会爆炸，对周围敌人造成_7_点伤害。\n\n爆炸只会对敌方单位造成伤害。

actors.hero.talent.hoshino_armor1_1.title=强力追击
actors.hero.talent.hoshino_armor1_1.desc=_+1:_追击的范围_+1格_，且斩杀阈值提高到_30%_。\n\n_+2:_追击的范围_+2格_，且斩杀阈值提高到_35%_。\n\n_+3:_追击的范围_+3格_，且斩杀阈值提高到_40%_。\n\n_+4:_追击的范围_+4格_，且斩杀阈值提高到_45%_。
actors.hero.talent.hoshino_armor1_2.title=追击击退
actors.hero.talent.hoshino_armor1_2.desc=_+1:_追击若未将敌人击杀，则将其击退_2格_，自身获得_5点_护盾。\n\n_+2:_追击若未将敌人击杀，则将其击退_4格_，自身获得_10点_护盾。\n\n_+3:_追击若未将敌人击杀，则将其击退_6格_，自身获得_15点_护盾。\n\n_+4:_追击若未将敌人击杀，则将其击退_8格_，自身获得_20点_护盾。
actors.hero.talent.hoshino_armor1_3.title=连续追击
actors.hero.talent.hoshino_armor1_3.desc=_+1:_追击若击杀了敌人，则下次追击的能量消耗_-13%_。\n\n_+2:_追击若击杀了敌人，则下次追击的能量消耗_-25%_。\n\n_+3:_追击若击杀了敌人，则下次追击的能量消耗_-38%_。\n\n_+4:_追击若击杀了敌人，则下次追击的能量消耗_-50%_。

actors.hero.talent.hoshino_armor2_1.title=锋锐棘刺
actors.hero.talent.hoshino_armor2_1.desc=_+1:_尖刺造成的流血值_+25%_。\n\n_+2:_尖刺造成的流血值_+50%_。\n\n_+3:_尖刺造成的流血值_+75%_。\n\n_+4:_尖刺造成的流血值_+100%_。
actors.hero.talent.hoshino_armor2_2.title=防御姿态
actors.hero.talent.hoshino_armor2_2.desc=_+1:_棘刺盾牌激活时，盾牌提供的防御力_+2_。\n\n_+2:_棘刺盾牌激活时，盾牌提供的防御力_+4_。\n\n_+3:_棘刺盾牌激活时，盾牌提供的防御力_+6_。\n\n_+4:_棘刺盾牌激活时，盾牌提供的防御力_+8_。
actors.hero.talent.hoshino_armor2_3.title=快速准备
actors.hero.talent.hoshino_armor2_3.desc=_+1:_当盾牌处于冷却时使用棘刺盾牌，会以_-10%_的充能消耗使得盾牌立刻冷却完毕。\n\n_+2:_当盾牌处于冷却时使用护甲能力，会以_-19%_的充能消耗使得盾牌立刻冷却完毕。\n\n_+3:_当盾牌处于冷却时使用护甲能力，会以_-27%_的充能消耗使得盾牌立刻冷却完毕。\n\n_+4:_当盾牌处于冷却时使用护甲能力，会以_-33%_的充能消耗使得盾牌立刻冷却完毕。\n\n

actors.hero.talent.hoshino_armor3_1.title=冲击吸收
actors.hero.talent.hoshino_armor3_1.desc=_+1:_盾牌招架每阻挡一次攻击，星野就治疗自己_2点_生命值。\n\n_+2:_盾牌招架每阻挡一次攻击，星野就治疗自己_4点_生命值。\n\n_+3:_盾牌招架每阻挡一次攻击，星野就治疗自己_6点_生命值。\n\n_+4:_盾牌招架每阻挡一次攻击，星野就治疗自己_8点_生命值。
actors.hero.talent.hoshino_armor3_2.title=动能反弹
actors.hero.talent.hoshino_armor3_2.desc=_+1:_盾牌招架每次格挡攻击，有_25%_概率对攻击者施加3回合麻痹。\n\n_+2:_盾牌招架每次格挡攻击，有_50%_概率对攻击者施加3回合麻痹。\n\n_+3:_盾牌招架每次格挡攻击，有_75%_概率对攻击者施加3回合麻痹。\n\n_+4:_盾牌招架每次格挡攻击，有_100%_概率对攻击者施加3回合麻痹。
actors.hero.talent.hoshino_armor3_3.title=转守为攻
actors.hero.talent.hoshino_armor3_3.desc=_+1:_盾牌招架每阻挡一次攻击，就给当前装备的枪支_装填0.5发子弹_。\n\n_+2:_盾牌招架每阻挡一次攻击，就给当前装备的枪支_装填1发子弹_。\n\n_+3:_盾牌招架每阻挡一次攻击，就给当前装备的枪支_装填1.5发子弹_。\n\n_+4:_盾牌招架每阻挡一次攻击，就给当前装备的枪支_装填2发子弹_。\n\n该天赋的小数部分是概率生效的，而非累计效果。

actors.hero.abilities.hoshino.chase.name=追击
actors.hero.abilities.hoshino.chase.short_desc=星野可以短距离跳跃，_攻击目标敌人_。
actors.hero.abilities.hoshino.chase.desc=星野使用追击，可跃向2格内的敌人进行攻击。若其生命值低于25%，则将其处决；否则对其造成20点无视防御的伤害。
actors.hero.abilities.hoshino.chase.too_far=距离太远，无法使用能力。
actors.hero.abilities.hoshino.spikeshield.name=棘刺盾牌
actors.hero.abilities.hoshino.spikeshield.short_desc=星野在使用盾牌时激活棘刺护盾，_期间每次受击都会对敌人造成流血伤害_。
actors.hero.abilities.hoshino.spikeshield.desc=星野在使用“钢铁荷鲁斯”时可以激活棘刺盾牌，在盾牌效果持续期间，每次受到物理伤害时，对攻击者施加相当于其最大生命值10%的流血。\n\n激活此能力不消耗回合，此能力的效果在钢铁荷鲁斯的效果解除时也随之消失。
actors.hero.abilities.hoshino.spikeshield.no_shield=需要先激活“钢铁荷鲁斯”！
actors.hero.abilities.hoshino.spikeshield.already_active=棘刺盾牌已经激活了。
actors.hero.abilities.hoshino.spikeshield$spikeshieldbuff.name=棘刺盾牌
actors.hero.abilities.hoshino.spikeshield$spikeshieldbuff.desc=唔嘿，靠近可是很危险的哦，离远点。\n\n在铁荷鲁斯展开期间，给盾牌装上了棘刺。攻击这个的家伙会相当疼的。
actors.hero.abilities.hoshino.shieldparry.name=盾牌弹反
actors.hero.abilities.hoshino.shieldparry.short_desc=星野在使用盾牌时，_可在1回合内格挡所有攻击_。
actors.hero.abilities.hoshino.shieldparry.desc=星野在使用“钢铁荷鲁斯”时可以进行盾牌弹反，在1回合内无伤格挡所有攻击。
actors.hero.abilities.hoshino.shieldparry.no_shield=需要先激活“钢铁荷鲁斯”！

###Shiroko 句子
actors.hero.heroclass.shiroko=白子
actors.hero.heroclass.shiroko_desc_short=阿拜多斯对策委员会2年级，砂狼白子。请多关照。\n\n难度：_普通_
actors.hero.heroclass.shiroko_desc=白子开局携带_自行车_，能够以双倍速度快速移动一定距离。\n\n白子擅长AR，使用AR所需_力量减少1_。\n\n白子使用爆炸属性子弹，_子弹命中时对敌人造成一次数值较低的追加伤害，数值与当前层数有关_。\n\n白子初始携带一把_1阶AR_、校服、皮革水袋与丝绒袋。\n\n白子开局鉴定的物品有:\n _-_ 鉴定卷轴\n_-_ 治疗药剂\n_-_ 盛怒卷轴
actors.hero.heroclass.shiroko_unlock=白子自动解锁。

actors.hero.herosubclass.professional_riding=EX：专业骑行
actors.hero.herosubclass.professional_riding_short_desc=白子学会了_专业骑行_，在骑乘自行车时可以消耗充能使出各种特技动作。
actors.hero.herosubclass.professional_riding_desc=白子在骑乘自行车时可额外消耗充能使出多种动作。\n\n压弯冲刺（充能 10）:消耗1回合，最多冲刺3格。可跃过悬崖与危险地形，并在经过的路径上（除悬崖外）留下2回合火焰。\n骑行装填（充能 10）:不消耗回合地装填当前枪械。\n加重冲撞（充能 15）:击退近身敌人3格。\n瞬间加速（充能 20）:下一次移动不消耗回合，且在移动后获得3回合迅捷。\n惯性漂移（充能 20）:不消耗冷却和回合地下车，自行车在接下来20回合内以3倍速度进行充能。
actors.hero.herosubclass.bank_robber=银行劫匪
actors.hero.herosubclass.bank_robber_short_desc=白子成为银行劫匪，给所有人带来_恐惧_并_从受影响的敌人身上获取信用点_。
actors.hero.herosubclass.bank_robber_desc=白子使用银行劫匪能力，消耗所有装填的子弹，对视野内所有敌人施加基于枪械阶数和消耗子弹数量的恐惧效果。敌人HP越高，恐惧效果越弱；完全健康的敌人几乎不受恐惧影响。\n\n若敌人的恐惧剩余时间大于20回合，则转变为魂飞魄散效果并掉落战利品。\n\n白子每次攻击受恐惧或魂飞魄散效果影响的敌人时，会根据造成伤害扒取信用点。

