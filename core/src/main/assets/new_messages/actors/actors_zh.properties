actors.hero.hero.noa_supernova_2=将意志寄托于这道光……
actors.hero.hero.noa_supernova_3=光啊！！！
actors.hero.hero.noa_supernova_shoot_1=……发射！平衡崩坏！
actors.hero.hero.noa_supernova_shoot_2=要上了！平衡崩坏！
actors.hero.hero.noa_supernova_shoot_3=……这样就行了吧，爱丽丝？

actors.hero.talent.noa_t1_1.title=攻击辅助装置
actors.hero.talent.noa_t1_1.desc=_+1:_装备转换套件的枪支，其近战攻击力_下限+1，上限+2_。\n\n_+2:_装备转换套件的枪支，其近战攻击力_+2_。
actors.hero.talent.noa_t1_2.title=自动手枪专家
actors.hero.talent.noa_t1_2.desc=_+1:__装备HG时_能将其立即鉴定。\n\n_+2:__捡起HG时_能将其立即鉴定。
actors.hero.talent.noa_t1_3.title=归零校准
actors.hero.talent.noa_t1_3.desc=_+1:_子弹未命中时，下一发子弹的精准度_+3点_。\n\n_+2:_子弹未命中时，下一发子弹的精准度_+5点_。\n\n若连续未击中，则每次都会获得一层此增益效果并叠加，直到击中后清除。
actors.hero.talent.noa_t1_4.title=准备万全
actors.hero.talent.noa_t1_4.desc=_+1:_弹匣归零时，获得_2点护盾_。\n\n_+2:_弹匣归零时，获得_3点护盾_。

actors.hero.talent.noa_t2_1.title=休息也是工作的一部分
actors.hero.talent.noa_t2_1.desc=_+1:_进食仅消耗1回合，进食后获得治疗效果，在_5回合内_每回合恢复1点体力。\n\n_+2:_进食仅消耗1回合，进食后获得治疗效果，在_8回合内_每回合恢复1点体力。
actors.hero.talent.noa_t2_2.title=文件复印
actors.hero.talent.noa_t2_2.desc=_+1:_诺亚在阅读卷轴或使用法术结晶后会有_20%_几率获得一张空白卷轴。\n\n_+2：_诺亚在阅读卷轴或使用法术结晶后会有_30%_几率获得一张空白卷轴。\n\n如果使用的是升级卷轴、嬗变卷轴或须用前述卷轴炼制的炼金物品，则获得空白卷轴的概率翻倍。\n\n对产量较高的炼金物品(如大多数结晶)，这项天赋会基于该物品的单次产出数量修正触发概率。\n\n空白卷轴可以对非升级的普通卷轴使用，变为其复制。
actors.hero.talent.noa_t2_3.title=熟练搜索
actors.hero.talent.noa_t2_3.desc=_+1:_探索范围扩大至_7x7圆形_。\n\n_+2:_探索范围扩大至_7x7方形_。
actors.hero.talent.noa_t2_4.title=装填步法
actors.hero.talent.noa_t2_4.desc=_+1:_在弹匣为空状态下装填时，诺亚获得_1回合_飞影，可不耗时间地移动。\n\n_+2:_在弹匣为空状态下装填时，诺亚获得_2回合_飞影，可不耗时间地移动
actors.hero.talent.noa_t2_5.title=结构掌握
actors.hero.talent.noa_t2_5.desc=_+1:_进入楼层时有_30%概率_揭示本楼层的所有陷阱并显示其位置。\n\n_+2:_进入楼层时有_50%概率_揭示本楼层的所有陷阱并显示其位置。

actors.hero.talent.noa_t3_1.title=完美精度
actors.hero.talent.noa_t3_1.desc=_+1:_射击命中后，5回合内下次射击_精度*2_。\n\n_+2:_射击命中后，5回合内下次射击_精度*5_。\n\n_+3:_射击命中后，5回合内下次射击_必中_。
actors.hero.talent.noa_t3_2.title=扩容弹匣
actors.hero.talent.noa_t3_2.desc=_+1:_枪支的子弹上限_+1_。\n\n_+2:_枪支的子弹上限_+2_。\n\n_+3:_枪支的子弹上限_+3_。

actors.hero.talent.noa_ex1_1.title=同步装填
actors.hero.talent.noa_ex1_1.desc=_+1:_装填主武器时，副武器也会装填_1发_弹药。\n\n_+2:_装填主武器时，副武器也会装填_2发_弹药。\n\n_+3:_装填主武器时，副武器也会装填_3发_弹药。\n\n该天赋无法使副武器弹药超过上限。
actors.hero.talent.noa_ex1_2.title=双重强化
actors.hero.talent.noa_ex1_2.desc=_+1:_诺亚所双持的武器，若低阶武器的阶数低于高阶武器_2阶或更多_，则低阶武器的强化等级可升至高阶武器的。\n\n_+2：_诺亚所双持的武器，若低阶武器的阶数低于高阶武器_1阶或更多_，则低阶武器的强化等级可升至高阶武器的。\n\n_+3：_诺亚所双持的武器，若低阶武器的阶数低于高阶武器_0阶或更多_，则低阶武器的强化等级可升至高阶武器的。
actors.hero.talent.noa_ex1_3.title=快速应对
actors.hero.talent.noa_ex1_3.desc=_+1:_诺亚近战攻击敌人后，_可用副武器对其使出技能射击_。\n\n_+2:_在+1效果基础上，_对相邻敌人的技能射击必中_。\n\n_+3:_在+2效果基础上，_击杀相邻敌人时，主副武器均立刻不触发额外效果地自动装填_。

actors.hero.talent.noa_ex2_1.title=获得灵感
actors.hero.talent.noa_ex2_1.desc=_+1:_诺亚_在阅读卷轴或使用法术结晶后恢复2点技能充能_，不同物品会使恢复量发生变化。\n\n_+2:_在+1效果基础上，诺亚_在使用符石后恢复2点技能充能_\n\n_+3:_在+2效果基础上，诺亚_恢复技能充能时恢复量+50%_。
actors.hero.talent.noa_ex2_2.title=口若悬河
actors.hero.talent.noa_ex2_2.desc=_+1:_诺亚使用技能有_33%_概率不消耗回合。\n\n_+2:_诺亚使用技能有_67%_概率不消耗回合。\n\n_+3:_诺亚使用技能有_100%_概率不消耗回合。
actors.hero.talent.noa_ex2_3.title=怀柔抚慰
actors.hero.talent.noa_ex2_3.desc=_+1:_因诺亚技能效果而沉沦的敌人恢复已损失生命值的_33%_。\n\n_+2:_因诺亚技能效果而沉沦的敌人恢复已损失生命值的_67%_。\n\n_+3:_因诺亚技能效果而沉沦的敌人恢复已损失生命值的_100%_。

actors.hero.talent.noa_armor1_1.title=陷阱失能
actors.hero.talent.noa_armor1_1.desc=_+1:_对陷阱使用能力时，目标周围3x3范围的_至多2个_陷阱也会被解除。\n\n_+2:_对陷阱使用能力时，目标周围3x3范围的_至多4个_陷阱也会被解除。\n\n_+3:_对陷阱使用能力时，目标周围3x3范围的_至多6个_陷阱也会被解除。\n\n_+4:_对陷阱使用能力时，目标周围3x3范围的_至多8个_陷阱也会被解除。
actors.hero.talent.noa_armor1_2.title=添加炸药
actors.hero.talent.noa_armor1_2.desc=_+1:_使用保存的陷阱时还会在目标位置制造爆炸，造成_4-12_点伤害。\n\n_+2:_使用保存的陷阱时还会在目标位置制造爆炸，造成_6-24_点伤害。\n\n_+3:_使用保存的陷阱时还会在目标位置制造爆炸，造成_8-36_点伤害。\n\n_+4:_使用保存的陷阱时还会在目标位置制造爆炸，造成_10-48_点伤害。
actors.hero.talent.noa_armor1_3.title=重复利用
actors.hero.talent.noa_armor1_3.desc=_+1:_使用陷阱后，已记录的陷阱有_10%_概率不会消除，可以再次使用。\n\n_+2:_使用陷阱后，已记录的陷阱有_20%_概率不会消除，可以再次使用。\n\n_+3:_使用陷阱后，已记录的陷阱有_30%_概率不会消除，可以再次使用。\n\n_+4:_使用陷阱后，已记录的陷阱有_40%_概率不会消除，可以再次使用。\n\n别忘了可以通过对自身使用陷阱以将其解除\n\n(但是截至6/27目前版本，这么做会闪退，好在翻译版本修了一下)

actors.hero.talent.noa_armor2_1.title=全息复制
actors.hero.talent.noa_armor2_1.desc=_+1:_使用能力有_25%_概率召唤2个全息影像，而非1个。\n\n_+2:_使用能力有_50%_概率召唤2个全息影像，而非1个。\n\n_+3:_使用能力有_75%_概率召唤2个全息影像，而非1个。\n\n_+4:_使用能力有_100%_概率召唤2个全息影像，而非1个。
actors.hero.talent.noa_armor2_2.title=实体镜像
actors.hero.talent.noa_armor2_2.desc=_+1:_召唤的镜像获得_15点护盾_且防御力_+1-4_。\n\n_+2:_召唤的镜像获得_30点护盾_且防御力_+2-8_。\n\n_+3:_召唤的镜像获得_45点护盾_且防御力_+3-12_。\n\n_+4:_召唤的镜像获得_60点护盾_且防御力_+4-16_。
actors.hero.talent.noa_armor2_3.title=模糊形体
actors.hero.talent.noa_armor2_3.desc=_+1:_全息影像必定闪避受到的前_2次_攻击。\n\n_+2:_全息影像必定闪避受到的前_4次_攻击。\n\n_+3:_全息影像必定闪避受到的前_6次_攻击。\n\n_+4:_全息影像必定闪避受到的前_8次_攻击。

actors.hero.talent.noa_armor3_1.title=光...啊？
actors.hero.talent.noa_armor3_1.desc=_+1:_使用能力后获得_50回合_发光。\n\n_+2:_使用能力后获得_100回合_发光。\n\n_+3:_使用能力后获得_150回合_发光。\n\n_+4:_使用能力后获得_200回合_发光。
actors.hero.talent.noa_armor3_2.title=功率提升
actors.hero.talent.noa_armor3_2.desc=_+1:_能力造成的伤害量_+25%_。\n\n_+2:_能力造成的伤害量_+50%_。\n\n_+3:_能力造成的伤害量_+75%_。\n\n_+4:_能力造成的伤害量_+100%_。
actors.hero.talent.noa_armor3_3.title=能量回收
actors.hero.talent.noa_armor3_3.desc=_+1:_使用能力后的5回合内，使用能力的能量消耗_-10%_。\n\n_+2:_使用能力后的5回合内，使用能力的能量消耗_-19%_。\n\n_+3:_使用能力后的5回合内，使用能力的能量消耗_-27%_。\n\n_+4:_使用能力后的5回合内，使用能力的能量消耗_-34%_。

actors.hero.abilities.noa.trapduplicate.name=陷阱复制
actors.hero.abilities.noa.trapduplicate.short_desc=诺亚可以_解除陷阱_并在指定位置使用。
actors.hero.abilities.noa.trapduplicate.desc=诺亚可以解除视野内暴露的陷阱，并在指定位置使用。如果选择自身位置使用，则移除存储的陷阱；仅在解除陷阱时消耗回合和充能。
actors.hero.abilities.noa.trapduplicate.out_of_view=无法选择视野外的位置。
actors.hero.abilities.noa.trapduplicate.no_trap=没有陷阱。
actors.hero.abilities.noa.trapduplicate.trap_preserved=陷阱已保存！
actors.hero.abilities.noa.trapduplicate.trap_removed=陷阱已移除。

actors.hero.abilities.noa.hologram.name=全息影像
actors.hero.abilities.noa.hologram.short_desc=诺亚可以召唤复制装备枪械进行射击的_全息影像_。
actors.hero.abilities.noa.hologram.desc=诺亚可以召唤造成当前装备枪械子弹伤害的全息影像。全息影像可以进行远程攻击。
actors.hero.abilities.noa.hologram.no_space=没有召唤全息影像的空间
actors.hero.abilities.noa.hologram$hologramimage.name=全息影像
actors.hero.abilities.noa.hologram$hologramimage.desc=该全息影像复制了您的外貌。全息影像在消失前能打出相当于装备枪械的射击伤害量的攻击，但耐久度较低。\n\n全息影像的攻击伤害=装备枪械的子弹伤害×一轮射击的伤害次数。
actors.hero.abilities.noa.supernovabeam.name=爱丽丝，借我用一下？
actors.hero.abilities.noa.supernovabeam.short_desc=诺亚可以发射爱丽丝的_光之剑：超新星_。
actors.hero.abilities.noa.supernovabeam.desc=诺亚可以暂时借用爱丽丝的光之剑：超新星进行发射，对12格直线路径上的所有敌人造成_20-100_伤害。

###Miyu Sentences
actors.hero.heroclass.miyu=美游
actors.hero.heroclass.miyu_desc_short=我是SRT特殊学园RABBIT小队的霞泽美游……那个，我想先回去了……不，不过果然还是不行吧……\n\n难度：_困难_
actors.hero.heroclass.miyu_desc=美游开局携带_隐蔽装置_，可以干扰追踪她的敌人。\n\n美游擅长SR，使用SR所需_力量减少1_。\n\n美游不易被敌人发现，此效果随等级提升而增强。她也不会将高草丛践踏成草地。\n\n美游初始携带一把_1阶SR_、3把投掷用小刀、校服、皮革水袋与丝绒袋。\n\n美游开局鉴定的物品有:\n _-_ 鉴定卷轴\n_-_ 治疗药剂\n_-_ 盛怒卷轴
actors.hero.heroclass.miyu_unlock=美游默认解锁。

actors.hero.herosubclass.telescope=望远镜观测
actors.hero.herosubclass.telescope_short_desc=美游可以用望远镜看到指定位置周围的小范围区域，并_无视障碍物向该位置射击_。
actors.hero.herosubclass.telescope_desc=美游使用望远镜，看到指定位置及其周围3x3格的地块，持续10回合，并可向该位置进行狙击射击。狙击会发射当前装备枪支的子弹，无视障碍物并必定命中。
actors.hero.herosubclass.camouflage=草丛伪装
actors.hero.herosubclass.camouflage_short_desc=美游的视野_可以看穿高草丛_，使用隐蔽装置会_生成遮挡敌人视线的枯萎植被_，并且_更难被敌人发现_。
actors.hero.herosubclass.camouflage_desc=美游的视野不再受高草丛阻挡；使用隐蔽装置时，会在周围地块生成可以遮挡敌人视线的枯萎植被。此外，在原有2点潜行加成的基础上，额外获得等级/3点的潜行加成。

actors.hero.hero.miyu_health_critical_1=唔唔……差不多到极限了。
actors.hero.hero.miyu_health_critical_2=身为狙击手的话，这种程度应该……能……撑住……
actors.hero.hero.miyu_health_critical_3=可能……快要到极限了……

actors.hero.hero.miyu_health_warn_1=嗯……啊，这点伤不算什么……
actors.hero.hero.miyu_health_warn_2=受了一点伤……
actors.hero.hero.miyu_health_warn_3=好想躲起来稍微休息一下……

actors.hero.hero.miyu_die=不要……对不起……

actors.hero.hero.miyu_enemy_defeated_1=继续行动。
actors.hero.hero.miyu_enemy_defeated_2=变更位置。
actors.hero.hero.miyu_enemy_defeated_3=总觉得敌人明明看到我却无视了我……是错觉吗？
actors.hero.hero.miyu_enemy_defeated_4=目标已失去行动能力。
actors.hero.hero.miyu_enemy_defeated_5=确认击毙。一切正常。

actors.hero.hero.miyu_levelup_1=对战术的理解更深了。
actors.hero.hero.miyu_levelup_2=至少……为了不愧对SRT之名……我会努力的。
actors.hero.hero.miyu_levelup_3=我会努力成长的……为了不拖大家的后腿。
actors.hero.hero.miyu_levelup_4=我……做得还好吗……？
actors.hero.hero.miyu_levelup_5=感觉变强了……
actors.hero.hero.miyu_levelup_rare=温暖的热可可什么的，好想喝……

actors.hero.hero.miyu_bin_use_1=开始执行干扰作战……
actors.hero.hero.miyu_bin_use_2=干扰敌人……
actors.hero.hero.miyu_bin_use_3=走……走掉了吗……？
actors.hero.hero.miyu_bin_cooldown=……现在还无法使用……
actors.hero.hero.miyu_cannot_see_wall=看来那边是行不通的呢……
actors.hero.hero.miyu_need_gun=需要装备一把枪。
actors.hero.hero.miyu_already_got=已经在用了。
actors.hero.hero.miyu_switching_new=RABBIT 4，装备反器材SR。
actors.hero.hero.miyu_switching_original=RABBIT 4，反器材SR使用完毕。解除装备……

actors.hero.talent.miyu_t1_1.title=战斗口粮
actors.hero.talent.miyu_t1_1.desc=_+1:_美游在探索后续几层时，可以找到_4块_压缩饼干。\n\n_+2:_美游在探索后续几层时，可以找到_6块_压缩饼干。\n\n食用压缩饼干只消耗1回合，获得相当于1/3口粮的饱食度，立即恢复5点生命值，重新装填装备的枪支，并额外装填4发子弹。重新装填不触发其他天赋效果。
actors.hero.talent.miyu_t1_2.title=狙击步枪专家
actors.hero.talent.miyu_t1_2.desc=_+1:__装备SR时_能将其立即鉴定。\n\n_+2:__捡起SR时_能将其立即鉴定。
actors.hero.talent.miyu_t1_3.title=奇袭射击
actors.hero.talent.miyu_t1_3.desc=_+1:_对敌人的首次奇袭射击造成_2点_额外伤害。\n\n_+2:_对敌人的首次奇袭射击造成_3点_额外伤害。
actors.hero.talent.miyu_t1_4.title=自然之友
actors.hero.talent.miyu_t1_4.desc=_+1:_美游踩踏高草丛时获得_2_点护盾。\n\n_+2:_美游踩踏高草丛时获得_3_点护盾。

actors.hero.talent.miyu_t2_1.title=孤独用餐
actors.hero.talent.miyu_t2_1.desc=_+1:_美游进食仅消耗1回合，并获得_5回合_隐身。\n\n_+2:_美游进食仅消耗1回合，并获得_8回合_隐身。\n\n还会让进食压缩饼干不消耗回合。
actors.hero.talent.miyu_t2_2.title=浇灌草丛
actors.hero.talent.miyu_t2_2.desc=_+1:_美游饮用或投掷一瓶药剂、魔药或秘药时，在相邻格子上生成最多_4格_草，并将周围敌人缠绕_1_回合。\n\n_+2:_美游饮用或投掷一瓶药剂、魔药或秘药时，在相邻格子上生成最多_6格_草，并将周围敌人缠绕_2_回合。\n\n如果使用的是力量药剂、经验药剂或须用前述药剂炼制的炼金物品，则生效格子数与缠绕回合数均翻倍。\n\n对产量较高的炼金物品(如水爆魔药)，这项天赋会基于该物品的单次产出数量而有概率触发
actors.hero.talent.miyu_t2_3.title=隐蔽技术
actors.hero.talent.miyu_t2_3.desc=_+1:_美游踩踏高草丛时获得_2回合_隐形。\n\n_+2:_美游踩踏高草丛时获得_3回合_隐形。
actors.hero.talent.miyu_t2_4.title=狙击点转移
actors.hero.talent.miyu_t2_4.desc=_+1:_美游射击击败敌人后获得_3回合_飞影，期间可不耗回合地移动。\n\n_+2:_美游射击击败敌人后获得_5回合_飞影，期间可不耗回合地移动。
actors.hero.talent.miyu_t2_5.title=消音器
actors.hero.talent.miyu_t2_5.desc=_+1:_美游的射击有_50%_概率不发出吸引敌人的噪音。\n\n_+2:_美游的射击有_100%_概率不发出吸引敌人的噪音。

actors.hero.talent.miyu_t3_1.title=致命狙杀
actors.hero.talent.miyu_t3_1.desc=_+1:_美游的奇袭射击伤害下限增加与上限差值的_25%_。\n\n_+2:_美游的奇袭射击伤害下限增加与上限差值的_33%_。\n\n_+3:_美游的奇袭射击伤害下限增加与上限差值的_50%_。
actors.hero.talent.miyu_t3_2.title=独处时更自在的类型
actors.hero.talent.miyu_t3_2.desc=_+1:_若没有任何敌人以美游为目标，则当前装备的枪械获得_+1_的额外强化等级。\n\n_+2:_若没有任何敌人以美游为目标，则当前装备的枪械获得_+2_的额外强化等级。\n\n_+3:_若没有任何敌人以美游为目标，则当前装备的枪械获得_+3_的额外强化等级。

actors.hero.talent.miyu_ex1_1.title=子弹时间
actors.hero.talent.miyu_ex1_1.desc=_+1:_当使用望远镜观测时，对距离美游_9格_及以外的敌人施加3回合迟缓。\n\n_+2:_当使用望远镜观测时，对距离美游_6格_及以外的敌人施加3回合迟缓。\n\n_+3:_当使用望远镜观测时，对距离美游_3格_及以外的敌人施加3回合迟缓。
actors.hero.talent.miyu_ex1_2.title=光学瞄具
actors.hero.talent.miyu_ex1_2.desc=_+1:_美游的基础视野_+25%_。\n\n_+2:_美游的基础视野_+50%_。\n\n_+3:_美游的基础视野_+75%_。
actors.hero.talent.miyu_ex1_3.title=狙击准备
actors.hero.talent.miyu_ex1_3.desc=_+1:_当使用望远镜观测时，美游立刻给装备的枪支装填_1发_子弹。\n\n_+2:_当使用望远镜观测时，美游立刻给装备的枪支装填_2发_子弹。\n\n_+3:_当使用望远镜观测时，美游立刻给装备的枪支装填_3发_子弹。\n\n该天赋装填的子弹可超过弹夹上限。

actors.hero.talent.miyu_ex2_1.title=得赶紧躲起来...！
actors.hero.talent.miyu_ex2_1.desc=_+1:_击杀敌人时有_33%_概率移除蔽装置的冷却时间。\n\n_+2:_击杀敌人时有_67%_概率移除蔽装置的冷却时间。\n\n_+3:_击杀敌人时有_100%_概率移除蔽装置的冷却时间。
actors.hero.talent.miyu_ex2_2.title=完美伪装
actors.hero.talent.miyu_ex2_2.desc=_+1:_隐蔽装置将在周围生成_草_。\n\n_+2:_隐蔽装置将在周围生成_枯萎植被_。\n\n_+3:_隐蔽装置将在周围生成_高草丛_。
actors.hero.talent.miyu_ex2_3.title=丛林特训
actors.hero.talent.miyu_ex2_3.desc=_+1:_美游踩踏高草丛时，获得_3回合的模糊身形_，期间必定闪避受到的下次攻击。\n\n_+2:_ 在+1效果基础上，美游在枯萎植被或高草丛中装填时，_减少2回合装填时间_，但装填时间不得少于1回合。\n\n_+3:_ 在+2效果基础上，美游在枯萎植被与高草丛上的_移动速度翻倍_。

actors.hero.talent.miyu_armor1_1.title=扰乱粉末
actors.hero.talent.miyu_armor1_1.desc=_+1:_闪光弹还有_25%_概率施加10回合眩晕和10回合恍惚。\n\n_+2:_闪光弹还有_50%_概率施加10回合眩晕和10回合恍惚。\n\n_+3:_闪光弹还有_75%_概率施加10回合眩晕和10回合恍惚。\n\n_+4:_闪光弹还有_100%_概率施加10回合眩晕和10回合恍惚。
actors.hero.talent.miyu_armor1_2.title=强化震荡
actors.hero.talent.miyu_armor1_2.desc=_+1:_闪光弹还有_25%_概率对爆炸点及其相邻格子的单位施加5回合麻痹。\n\n_+2:_闪光弹还有_50%_概率对爆炸点及其相邻格子的单位施加5回合麻痹。\n\n_+3:_闪光弹还有_75%_概率对爆炸点及其相邻格子的单位施加5回合麻痹。\n\n_+4:_闪光弹还有_100%_概率对爆炸点及其相邻格子的单位施加5回合麻痹。
actors.hero.talent.miyu_armor1_3.title=安全保障
actors.hero.talent.miyu_armor1_3.desc=_+1:_闪光弹每影响到一个单位，美游获得_3点_护盾。\n\n_+2:_闪光弹每影响到一个单位，美游获得_6点_护盾。\n\n_+3:_闪光弹每影响到一个单位，美游获得_9点_护盾。\n\n_+4:_闪光弹每影响到一个单位，美游获得_12点_护盾。\n\n该天赋最多只能计入10个目标。

actors.hero.talent.miyu_armor2_1.title=膝盖中枪
actors.hero.talent.miyu_armor2_1.desc=_+1:_技能射击还将对敌人施加_4回合_残废与_2回合_束缚。\n\n_+2:_技能射击还将对敌人施加_8回合_残废与_4回合_束缚。\n\n_+3:_技能射击还将对敌人施加_12回合_残废与_6回合_束缚。\n\n_+4:_技能射击还将对敌人施加_16回合_残废与_8回合_束缚。
actors.hero.talent.miyu_armor2_2.title=弱点射击
actors.hero.talent.miyu_armor2_2.desc=_+1:_技能射击还将对敌人施加_2回合_虚弱与_2回合_易伤。\n\n_+2:_技能射击还将对敌人施加_3回合_虚弱与_3回合_易伤。\n\n_+3:_技能射击还将对敌人施加_5回合_虚弱与_5回合_易伤。\n\n_+4:_技能射击还将对敌人施加_6回合_虚弱与_6回合_易伤。
actors.hero.talent.miyu_armor2_3.title=抑止裂片
actors.hero.talent.miyu_armor2_3.desc=_+1:_技能射击造成的流血效果数值_+10%_。\n\n_+2:_技能射击造成的流血效果数值_+20%_。\n\n_+3:_技能射击造成的流血效果数值_+30%_。\n\n_+4:_技能射击造成的流血效果数值_+40%_。

actors.hero.talent.miyu_armor3_1.title=动能传递
actors.hero.talent.miyu_armor3_1.desc=_+1:_反器材SR的射击击退敌人的距离_+50%_。\n\n_+2:_反器材SR的射击击退敌人的距离_+100%_。\n\n_+3:_反器材SR的射击击退敌人的距离_+150%_。\n\n_+4:_反器材SR的射击击退敌人的距离_+200%_。
actors.hero.talent.miyu_armor3_2.title=装甲破坏
actors.hero.talent.miyu_armor3_2.desc=_+1:_反器材SR的射击对敌人施加_5回合_易伤。\n\n_+2:_反器材SR的射击对敌人施加_10回合_易伤。\n\n_+3:_反器材SR的射击对敌人施加_15回合_易伤。\n\n_+4:_反器材SR的射击对敌人施加_20回合_易伤。
actors.hero.talent.miyu_armor3_3.title=备弹充足
actors.hero.talent.miyu_armor3_3.desc=_+1:_切换到反器材SR时，_有50%概率_给反器材SR额外装填1发子弹并将原枪支重新装填。\n\n_+2:_切换到反器材SR时，_必定_给反器材SR额外装填1发子弹并将原枪支重新装填。\n\n_+3:_切换到反器材SR时，_必定_给反器材SR额外装填1发子弹并将原枪支重新装填，且_有50%概率_给反器材SR额外再装填2发子弹并给原枪支再装填1发子弹。\n\n_+4:_切换到反器材SR时，_必定_给反器材SR额外装填2发子弹并将原枪支重新装填后再给其装填2发子弹。

actors.hero.abilities.miyu.flashbang.name=投掷闪光弹！
actors.hero.abilities.miyu.flashbang.short_desc=美游投掷闪光弹，_致盲爆炸范围内的所有目标_。
actors.hero.abilities.miyu.flashbang.desc=美游投掷闪光弹，致盲周围半径2格内的所有目标，持续10回合。注意该效果也会对友军和自己生效。
actors.hero.abilities.miyu.hpbullet.name=装填空尖弹
actors.hero.abilities.miyu.hpbullet.short_desc=美游装填反人员空尖弹，使得下一发子弹改为造成_流血效果_。
actors.hero.abilities.miyu.hpbullet.desc=美游装填反人员空尖弹，为当前装备枪械装填1发子弹，下一发射击必中，并改为对目标施加与普通伤害等量的流血效果。对免疫流血的敌人无效且无法触发天赋效果。\n\n首领或强力敌人可能会抵抗流血效果。
actors.hero.abilities.miyu.hpbullet$hpbulletbuff.name=反人员空尖弹
actors.hero.abilities.miyu.hpbullet$hpbulletbuff.desc=下一次射击将发射反人员空尖弹，不直接造成伤害，而是施加等量的流血效果。\n\n_对免疫流血的敌人只会造成普通伤害，首领或强力敌人可能会抵抗此效果。_
actors.hero.abilities.miyu.antimaterialrifle.name=反器材狙击步枪
actors.hero.abilities.miyu.antimaterialrifle.short_desc=美游使用反器材SR，_可以穿透并摧毁墙壁，击飞敌人_。
actors.hero.abilities.miyu.antimaterialrifle.desc=美游将武器切换为装备反器材SR，保留当前装备枪械的强化等级和附魔等效果。\n\n反器材SR可以穿透1格厚的墙壁，并可能摧毁被穿透的墙壁。若未穿透墙壁，则会将命中的敌人击退4格。\n\n反器材SR是一把6阶的SR，基础力量需求为18。当反器材SR的弹药耗尽、进行装填或手动解除时，将切换回原来的枪械。反器材SR无法丢出。

###Yuzu Sentences
actors.hero.heroclass.yuzu=柚子
actors.hero.heroclass.yuzu_desc_short=游戏开发部，部长...柚子。真...真的要...把我带上吗？
actors.hero.heroclass.yuzu_desc=柚子开局携带_UZ游戏机_，可以花费信用点购买各种物品与属性强化。\n\n柚子擅长GL，使用GL所需_力量减少1_。柚子使用榴弹爆炸等效果只对自身造成_25%_的伤害，而且不会破坏物品。\n\n每生成8个敌人，柚子将其中一个指定为任务目标，消灭任务目标可获得额外的经验和信用点。\n\n柚子初始携带一把_1阶GL_、校服、皮革水袋与丝绒袋。\n\n柚子开局鉴定的物品有:\n _-_ 鉴定卷轴\n_-_ 治疗药剂\n_-_ 盛怒卷轴
actors.hero.heroclass.yuzu_unlock=_消灭一个敌人_以解锁柚子。

actors.hero.herosubclass.avant_garde_kun=搭乘前卫君！
actors.hero.herosubclass.avant_garde_kun_short_desc=柚子可以_驾驶前卫君_。
actors.hero.herosubclass.avant_garde_kun_desc=柚子可以呼叫并搭乘大型机器人前卫君。搭乘时，远程射击会随机选取背包内最多3把枪，然后用一个回合用其全都射击一次。近身攻击时会将目标敌人推开，并将背包内的全部枪支全部立刻重新装填。前卫君会代替柚子受到伤害，在被破坏后进入200回合的冷却。
actors.hero.herosubclass.game_start=游戏开始！
actors.hero.herosubclass.game_start_short_desc=柚子可以购买并操作各种_游戏手柄_。
actors.hero.herosubclass.game_start_desc=柚子可以通过天赋解锁购买并使用各种游戏手柄，发挥特定效果。\n\n格斗游戏手柄：极大地加强近战攻击，但是移动受限制。\n\n奇幻游戏手柄：对敌人释放强大的魔法攻击，但是不能移动。\n\n沙盒游戏手柄：改变地块与地形，期间不能移动\n\n游戏界面被关闭的话效果取消，但使用续关手柄可再次呼出。

