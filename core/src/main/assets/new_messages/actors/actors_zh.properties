actors.hero.abilities.nonomi.present.name=给所有人的礼物
actors.hero.abilities.nonomi.present.short_desc=野宫给视野内的敌人赠送礼物，_让他们暂时无法攻击野宫_。
actors.hero.abilities.nonomi.present.desc=野宫给视野内的所有敌人赠送礼物，赋予他们5回合的魅惑，暂时无法攻击野宫。
actors.hero.abilities.nonomi.blackcard.name=黑卡
actors.hero.abilities.nonomi.blackcard.short_desc=野宫消耗所有积分，_对视野内的所有敌人造成无视防御的伤害_。
actors.hero.abilities.nonomi.blackcard.desc=野宫使用黑卡的力量，消耗所有积分，每消耗30积分就对视野内的所有敌人造成1点无视防御的伤害。
actors.hero.abilities.nonomi.bipod.name=脚架部署
