###Yuzu Console Contents
actors.hero.console.yuzuconsolecontent.prompt=请选择位置

actors.hero.console.fighter.fighterconsolecontent$fighterconsolebuff.name=格斗游戏手柄
actors.hero.console.fighter.fighterconsolecontent$fighterconsolebuff.desc=当前还有_%d_枚代币。\n\n使用续关手柄可再次打开界面，消耗代币以发动效果，使用新的对应手柄可增加代币。\n\n操作指南：每次消耗1代币，期间近身攻击视作装备了武力戒指。\n\n上下左右：向对应位置移动1格，速度为正常情况下的三倍。强化状态下移动不消耗回合。\n\n轻击：消耗0.5回合攻击，造成50%的伤害，并获得强化状态，强化状态下造成100%的伤害。\n\n重击：消耗1回合攻击，造成100%的伤害。强化状态下造成150%的伤害并将敌人击退3格。\n\n蓄力：消耗一回合，原地获得强化状态。已经强化则获得2枚代币。

actors.hero.console.fantasy.fantasyconsolecontent$fantasyconsolebuff.name=奇幻游戏手柄
actors.hero.console.fantasy.fantasyconsolecontent$fantasyconsolebuff.desc=当前还有_%d_枚代币。\n\n使用续关手柄可再次打开界面，消耗代币以发动效果，使用新的对应手柄可增加代币。\n\n操作指南：消耗代币发动法术，在该状态下再次使用奇幻游戏手柄则强化下个法术。法术伤害基础值与天赋和英雄等级相关。\n\n火球：消耗1代币，对目标发射火球，对其造成基础值100%的伤害并将其点燃。强化状态下对目标及其周围生效。\n\n水爆：消耗2代币，在目标位置引发类似水爆陷阱的效果，对周围敌人造成基础值50%的伤害并击退。受影响的地块若为空井，有10%概率将其生成为井，分布与自然生成的概率相同。强化状态下不消耗代币。\n\n雷击：消耗3代币，电击目标3次，每次造成基础值40%的伤害，并以实际值40%的伤害再弹跳到周围。强化状态下电击5次。\n\n冰枪：消耗5代币，对目标投出冰枪，造成基础值200%的伤害并将其冻结。强化状态下造成基础值400%的伤害。\n\n黑洞：消耗10代币，在目标位置召唤类似塌方陷阱的效果，boss层无效。强化状态下英雄还会获得2回合浮空。

actors.hero.console.sandbox.sandboxconsolecontent$sandboxconsolebuff.name=沙盒游戏手柄
actors.hero.console.sandbox.sandboxconsolecontent$sandboxconsolebuff.desc=当前还有_%d_枚代币。\n\n使用续关手柄可再次打开界面，消耗代币以发动效果，使用新的对应手柄可增加代币。\n\n操作指南：消耗代币，点击相邻地块，花费一回合以改变其地形。\n\n种植：消耗1代币，在空地上种草，或使草变为高草丛。\n\n设障：消耗2代币，在非门的可移动地块上放置雕像，在可移动门上则放置障碍物。\n\n架桥：消耗1代币，在虚空地块上架桥，使其变为普通地块。\n\n挖掘：消耗5代币，破坏硬质目标地块（如墙壁），使其变为普通地块。\n\n凿井：消耗10代币，对普通空地块使用，使其变为空井地块。