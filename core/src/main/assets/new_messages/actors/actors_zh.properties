actors.hero.hero.noa_unreachable_target=那边那家伙听不到我的话。
actors.hero.hero.noa_debuff_drowsy_1=我来介绍下从响同学那里收到的有趣论文的一部分——（听不懂的弹道学相关内容）……哎呀？您困了吗……
actors.hero.hero.noa_debuff_drowsy_2=晴同学给我发了关于无人机的有趣内容——（听不懂的航空学相关内容）……已经到睡觉时间了吗？呵呵
actors.hero.hero.noa_debuff_drowsy_3=这是和千寻同学讨论黑客时的内容——（听不懂的黑客相关内容）……哎呀，还有很多话要说呢，真遗憾……
