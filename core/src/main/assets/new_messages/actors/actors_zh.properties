actors.hero.hero.noa_debuff_daze_1=现在开始向您介绍爱丽丝的魅力。（开始列举爱丽丝可爱的154个理由）
actors.hero.hero.noa_debuff_daze_2=我有一首非常喜欢的诗。（开始朗诵诗）
actors.hero.hero.noa_debuff_daze_3=最近读到一段非常感人的句子……（开始吟诵诗句）
