actors.buffs.avantgardekunbuff$onboard.desc==呃…没想到要操作这样的机器人…啊，这里写着操作方法。\n\n_对远处地块使用能力_，可用至多3把背包内的枪支向那个位置射击。\n_对相邻地块使用能力_，可将地块上的敌人推开，并重新装填背包内的所有枪支。\n_对当前地块使用能力_则会从机器人上下来。\n\n根据状态UI显示，当前耐久度为_%1$d/%2$d_。
