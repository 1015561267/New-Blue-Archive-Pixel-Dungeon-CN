###aris
actors.hero.heroclass.aris=爱丽丝
actors.hero.heroclass.aris_desc_short=今天要去什么样的冒险呢? 爱丽丝准备好一起踏上旅程了。\n\n难度: _特殊_
actors.hero.heroclass.aris_desc=爱丽丝初始携带着一枚能够生成护盾的_千年徽章_。“不是干电池!”爱丽丝的徽章可以在护甲间转移，并且能够携带_一级升级_。\n\n爱丽丝作为探险迷宫的勇士，初始携带的不是枪械而是近战武器，在地牢中也只会找到近战武器。\n\n爱丽丝初始携带一柄_磨损的短剑_，_三颗石子_，_光之剑:超新星_，千年科学学院实验服，皮革水袋与丝绒袋。\n\n爱丽丝开局鉴定的物品有:\n _-_ 鉴定卷轴\n_-_ 治疗药剂\n_-_ 盛怒卷轴
actors.hero.heroclass.aris_unlock=爱丽丝自动解锁。

actors.hero.herosubclass.light_hero=EX: 光之勇士
actors.hero.herosubclass.light_hero_short_desc=肩负着光之勇士使命的爱丽丝可以将_光之剑:超新星作为近战武器挥舞_。
actors.hero.herosubclass.light_hero_desc=肩负着光之勇士使命的爱丽丝可以将_光之剑:超新星作为近战武器挥舞_。
actors.hero.herosubclass.battery_charge=EX: 电池过载！
actors.hero.herosubclass.battery_charge_short_desc=爱丽丝每次近战击中敌人时，都会给光之剑:超新星积累过载层数，_过载层数可用于快速冷却下一次平衡崩溃，或加强其伤害_。
actors.hero.herosubclass.battery_charge_desc=爱丽丝每次近战击中敌人时，都会给光之剑:超新星积累一层过载\n\n过载可主动消耗以减少平衡崩溃冷却时间；或在使用平衡崩溃时自动消耗，每层过载使其造成的伤害+1%。

