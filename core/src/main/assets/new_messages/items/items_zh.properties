items.active.trashbin$evasionbuff.name=身形模糊
items.active.trashbin$evasionbuff.desc=…现在正在隐身中，敌人攻击我也打不到。\n\n必定回避_%s_回合内的下一次攻击，随后解除该效果。

items.food.hardtack.name=压缩饼干
items.food.hardtack.desc=用面粉做的，干巴巴的硬质食物。食用压缩饼干只消耗1回合，恢复100点饱食度（相当于1/3的口粮），获得5点治疗，重新装填当前装备的枪支，并额外装填4发子弹。\n\n此次重新装填不会触发天赋效果。

