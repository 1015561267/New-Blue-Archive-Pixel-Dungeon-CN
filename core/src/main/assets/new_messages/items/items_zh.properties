items.artifacts.ninjacape.cursed=不能使用被诅咒的斗篷。
items.artifacts.ninjacape.no_charge=忍者斗篷充能不足，无法使用。
items.artifacts.ninjacape.desc=泉奈在执行忍者任务时，为了完美伪装而使用的斗篷。泉奈可以用其闪现很短的距离随后隐身，如果对自己所在的地块使用，则只会隐身。\n\n忍者斗篷的充能速度较慢，但使用_暗杀苦无_偷袭击杀敌人可快速恢复部分充能。\n\n斗篷会随着消耗充能而加强，提高充能上限和充能速度。
items.artifacts.ninjacape.prompt=选择要闪现的位置
items.artifacts.ninjacape.discover_hint=特定学生开局会携带这个物品。
