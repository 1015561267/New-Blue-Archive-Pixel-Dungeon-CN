items.scrolls.emptyscroll.name=空白卷轴
items.scrolls.emptyscroll.desc=什么也没有写的白纸。一边看着持有的卷轴，一边照着内容抄写，就能获得与那卷轴相同的力量。\n\n似乎无法复制升级卷轴或密卷。
