items.active.trashbin.name=隐蔽装置
items.active.trashbin.desc=因为和周围的环境太般配了，所以躲进去的话谁也不知道这里为什么会有个垃圾桶。\n\n使用时，使所有正在追猎的敌人丢失其目标，进入游荡状态。\n\n如果美游仍在敌人视野内，可能会被丢失目标的敌人再次发现。\n\n使用后有20回合的冷却时间。
items.active.trashbin.ac_use=使用
