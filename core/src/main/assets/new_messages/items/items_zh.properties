items.active.handgrenade.ac_lightthrow=投掷手榴弹！
items.active.handgrenade.no_left=手榴弹用完了。

items.active.ironhorus.name=镇压盾牌“钢铁荷鲁斯”
items.active.ironhorus.desc=星野随身携带的折叠式盾牌。使用后可获得_%1$d-%2$d_点额外防御力；切换武器，丢下盾牌或移动均会解除此效果并进入10回合冷却。\n\n若在使用HG时使用盾牌，则在移动时不会解除盾牌的效果，但是盾牌提供的额外防御力会减半。\n\n随着等级的上升，使用后获得的防御力增加。
items.active.ironhorus.ac_use=使用
items.active.ironhorus$tacticalshieldbuff.name=部署镇压盾牌！
items.active.ironhorus$tacticalshieldbuff.desc=嗯？这是什么~？\n\n这个嘛~如果在战斗之前设置的话，就会成为坚固的掩体，是我重要的战友呢。虽然这面盾牌不能100%%阻止敌人的攻击，但也能阻止_%1$d-%2$d_的伤害。\n\n会妨碍到换枪或重新装填，以及战斗结束后的移动，所以需要重新折叠。如果想要再次使用会需要一点时间，所以最好不要在需要快速移动的时候使用。
items.active.ironhorus$lighttacticalshieldbuff.name=展开防爆盾牌！
items.active.ironhorus$lighttacticalshieldbuff.desc=嗯？这是什么~？\n\n这个嘛~如果在战斗中拿着的话，就会成为坚固的掩体，是我重要的战友呢。虽然提供的防御比固定部署时要少，但也能阻止_%1$d-%2$d_的伤害。\n\n会妨碍到换枪或重新装填，所以需要重新折叠。如果想要再次使用会需要一点时间，所以最好不要在预计战斗频繁的时候使用。
items.active.ironhorus$tacticalshieldcooldown.name=镇压盾牌-冷却
items.active.ironhorus$tacticalshieldcooldown.desc=呃啊~给我点时间整理一下这个。如果想在需要的时候快速使用，就需要把它整理好。\n\n再等_%s_回合的话，准备就完成了。
item.active.ironhorus$shieldbashbuff.action_name=盾牌冲锋

items.active.bicycle.name=自行车
items.active.bicycle.desc=白子骑的蓝色自行车。每次下车移动的时候，自行车会自行充能。骑着就能快速移动，只不过骑在自行车上很难瞄准射击，所以要注意。
items.active.bicycle.ac_use=使用
items.active.bicycle$bicyclebuff.name=骑行
items.active.bicycle$bicyclebuff.action_name=专业骑行
items.active.bicycle$bicyclebuff.desc_1=嗯。…这个吧？正如你所看到的，虽然是自行车。..
items.active.bicycle$bicyclebuff.desc_acc=骑自行车可以快速移动，但骑自行车的情况下很难瞄准射击/暂时下车并不难，所以在战斗中尽量下车比较好。
items.active.bicycle$bicyclebuff.desc_2=在这种地方不规则地快速骑自行车会很快疲倦，需要周期性的休息。虽然短距离快速骑行很容易，但一次很难移动_%1$s格_以上。\n\n从现在开始可以再骑自行车的距离是_%2$s格_。
items.active.bicycle$professionalridemove.skid_mark.name=压弯冲刺
items.active.bicycle$professionalridemove.skid_mark.desc=白子使用_压弯冲刺_，可在1回合内冲刺3格，能够越过陷阱和危险地形，并在经过的路径上留下2回合的火焰。
items.active.bicycle$professionalridemove.riding_reload.name=骑行装填
items.active.bicycle$professionalridemove.riding_reload.desc=白子使用_骑行装填_，可以不消耗回合地立即装填当前装备的枪械。
items.active.bicycle$professionalridemove.slam.name=加重冲撞
items.active.bicycle$professionalridemove.slam.desc=白子利用重量和加速度进行_加重冲撞_，可将近身的敌人击退最多3格。
items.active.bicycle$professionalridemove.accelerate.name=瞬间加速
items.active.bicycle$professionalridemove.accelerate.desc=白子使用_瞬间加速_，下次移动不消耗回合，并在移动后获得3回合的迅捷。
items.active.bicycle$professionalridemove.drift.name=惯性漂移
items.active.bicycle$professionalridemove.drift.desc=白子使用_漂移_，可不消耗冷却时间立即从自行车上下来，在接下来的20回合内自行车的充能速度变为3倍，该效果在再次上车时会立即解除。惯性漂移在击败5个敌人后才能再次激活。
items.active.bicycle$bicyclecooldown.name=冷却时间：骑行
items.active.bicycle$bicyclecooldown.desc=请稍等片刻，需要稍作整备。\n\n自行车将在_%s回合_后准备就绪。
items.active.bicycle$driftbuff.name=漂移
items.active.bicycle$driftbuff.desc=嗯……刚才利用漂移的惯性，可以立即从自行车上下来。接下来_%s回合_内，自行车能准备得更快。\n\n注意：一旦上车，这个效果就会消失。

