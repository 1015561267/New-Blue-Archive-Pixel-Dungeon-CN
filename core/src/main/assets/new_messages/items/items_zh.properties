items.active.grenade.ac_lightthrow=投掷手榴弹！
items.active.grenade.reload=+1 %s

items.active.claymore.name=阔剑地雷
items.active.claymore.desc=宫子携带的小型阔剑地雷。引爆后会对前方扇形区域造成巨大伤害，并可能致残受影响的敌人。\n\n伤害和致残几率会随着等级上升而增加。
items.active.claymore.throw_desc=伤害: _%1$d-%2$d_\n剩余使用次数：_%3$d/%4$d_\n击杀时恢复概率：_%5$s%%_
items.active.claymore.ac_lightthrow=引爆
items.active.claymore.no_left=阔剑地雷用完了。

items.active.handgrenade.name=手榴弹
items.active.handgrenade.desc=宫子携带的手榴弹。投掷后会在弹着点立即爆炸造成伤害。对自己也会造成伤害，所以要小心。\n\n最大持有量会随着等级上升而增加。
