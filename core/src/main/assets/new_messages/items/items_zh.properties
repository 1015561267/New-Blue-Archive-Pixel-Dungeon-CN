items.remains.remainsitem.ac_use=使用
items.remains.remainsitem.discover_hint=你可从上一局某位英雄的遗骸中找到该物品。

items.remains.nba.arisremain.name=破碎徽章
items.remains.nba.arisremain.desc=这枚不再闪耀已经断裂的徽章似乎来源于一位于此撤退的小勇者。你能感觉到其上还有一些残存的能量，你可以运用起这股能量获得小勇者的保护，但随着能量的耗尽，徽章也会随之烟消云散。（获得一定量的护盾）

items.remains.nba.nonomiremain.name=损耗金卡
items.remains.nba.nonomiremain.desc=一张从中间裂开的金卡，隐约可看到未断开前那奢华精致的做工，似乎有人在挂失它？你可以把它还给主人回收获得一点信用点，但随着交付成功，金卡本身也会被其主人拿走。（获得一些的信用点）

items.remains.nba.miyakoremain.name=磨损手榴弹
items.remains.nba.miyakoremain.desc=一枚型号特殊磨损明显的手榴弹。其上的编号证明了它曾属于某只精干小队的成员，碍于其特殊的结构你不知道怎么正确的使用它，但用力砸到敌人脑袋上估计也会出现不小的动静。这枚手雷的型号过于特殊，你大概没法找到第二枚一样的了。（丢出时视作一次宫子的手榴弹爆炸）

items.remains.nba.hoshinoremain.name=盾牌碎片
items.remains.nba.hoshinoremain.desc=看起来是有个迷迷糊糊的贪睡鬼把随身的盾牌遗落在了这里。更糟糕的是盾牌的卡扣也不知为何卡住了，不过其坚固材质倒是可以帮你抵挡一次攻击，但抵挡过伤害后卡扣便会彻底失灵从无法继续使用。（获得一次凝神）
items.remains.nba.hoshinoremain$focusbuff.name=格挡
items.remains.nba.hoshinoremain$focusbuff.desc=坚固的盾牌可以完全抵御下一次伤害，随后便会解除。

items.remains.nba.shirokoremain.name=自行车轮胎
items.remains.nba.shirokoremain.desc=这个明显破坏严重的轮胎应当是来自某位骑行爱好者的自行车上，一旁的碎片无声诉说着其经历的磨难。轮胎上残留着疾行的气息，或许你可以利用它短暂提升自己的速度，但是随着神秘的力量耗尽轮胎也会彻底报废。（使用后，获得持续时间与层数相关的极速）

items.remains.nba.noaremain.name=断裂套件
items.remains.nba.noaremain.desc=这个套件与之前看到的徽章似乎出自同一组织之手，同样的精良做工显示着其主人的能工手巧，但很可惜它已从中间断裂。套件似乎还有搜索的功能，激活它可以使你对周遭的环境了如指掌，但其已经断裂的材质显然只能支持你发动一次这种功能，完成它的使命后套件将彻底变为废品。（使用后探查周围12x12的圆形范围）

items.remains.nba.miyuremain.name=垃圾桶盖
items.remains.nba.miyuremain.desc=这个垃圾桶盖的主人行踪不明，但很明显这是其仓皇逃跑留下的物品。这桶盖的特殊用途使你可以暂时隐蔽在其伪装之下。但单单一个桶盖的承载力也十分有限，在为你提供一次数回合的隐身后，垃圾桶盖将因被敌人发现而被破坏。（使用后，获得持续时间与层数数成正比的的隐形）

items.remains.nba.yuzuremain.name=游戏机内存卡
items.remains.nba.yuzuremain.desc=某个游戏大师不小心将她存储珍贵游戏数据的内存卡遗留在此，看其损坏程度，也不可能再被采用了。内存卡里遗留了一些数据，读取出来可以让你暂时理解其主人的资深技巧，并让你接下来的3次攻击造成暴击。可惜读取内存卡并物尽其用后其便会彻底损坏。

items.remains.nba.izunaremain.name=磨损苦无
items.remains.nba.izunaremain.ac_slash=攻击
items.remains.nba.izunaremain.desc=这把苦无和你在地牢里见过的不同，是某位忍者的暗杀利器，如今它的刃身已生锈起藓。用这把苦无伏击敌人会使其与你背包中的神器共鸣，为你的神器回复充能，但其磨损非常，大概无法用其发动二次攻击。（仅可突袭一名相邻敌人，视作用+0暗杀苦无对其造成一次攻击，并获得4回合神器充能效果，斗篷可立刻恢复一点充能）

