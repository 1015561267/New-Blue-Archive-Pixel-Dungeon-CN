items.artifacts.ninjacape$capestealth.levelup=斗篷升级了!
items.artifacts.ninjacape$capestealth.name=斗篷之下
items.artifacts.ninjacape$capestealth.desc=泉奈披上忍者斗篷后，会进入隐身状态。效果会持续到手动取消或斗篷的能量耗尽为止。\n\n在隐身状态下，敌人无法追踪或攻击你。但进行物理攻击或使用魔法效果（如使用魔杖或阅读卷轴等）会结束隐身。\n\n离斗篷能量耗尽还有%d回合。
items.artifacts.ninjacape$foxdoll.name=狐狸玩偶
items.artifacts.ninjacape$foxdoll.desc=泉奈手工缝制的娃娃。不知道为什么，但敌人好像以为这才是真正的我！
items.artifacts.ninjacape$foxdoll.discover_hint=你可通过特定ex能力遇到该单位。